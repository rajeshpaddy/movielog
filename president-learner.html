<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>American Presidents Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
      overflow-x: hidden;
    }
    .app-container { 
      display: flex; 
      height: 100vh; 
      gap: 12px; 
      padding: 12px; 
    }
    .pane { 
      background: #16213e; 
      border-radius: 20px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 320px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 350px;
    }
    .pane-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #fbbf24;
      text-align: center;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 2px solid #fbbf24;
      color: #fff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: #888; }
    .search-box:focus { outline: none; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
    .president-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .president-item {
      background: #0f3460;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .president-item:hover { 
      background: #1a4a7a; 
      transform: translateX(5px);
    }
    .president-item.selected {
      background: #fbbf24;
      color: #1a1a2e;
    }
    .president-item.focused {
      outline: 3px solid #fbbf24;
      outline-offset: -3px;
    }
    .president-item .number {
      font-size: 32px;
      font-weight: bold;
      color: #fbbf24;
      min-width: 50px;
    }
    .president-item.selected .number {
      color: #1a1a2e;
    }
    .president-item .info {
      flex: 1;
    }
    .president-item .name {
      font-weight: 600;
      font-size: 18px;
      text-transform: capitalize;
    }
    .president-item .years {
      font-size: 14px;
      opacity: 0.8;
    }
    .president-item .tenure {
      font-size: 13px;
      color: #fbbf24;
      font-weight: 600;
    }
    .president-image {
      width: 200px;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      margin: 20px auto;
      display: block;
      border: 4px solid #fbbf24;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }
    .key-events {
      background: #0f3460;
      border-radius: 16px;
      padding: 20px;
      margin-top: 15px;
    }
    .key-events ul {
      margin: 0;
      padding-left: 20px;
    }
    .key-events li {
      font-size: 16px;
      line-height: 1.6;
      color: #ddd;
      margin-bottom: 8px;
    }
    .showcase-header {
      text-align: center;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .select-btn {
      background: #fbbf24;
      color: #1a1a2e;
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5);
    }
    .select-btn.unselect {
      background: #ff6b6b;
    }
    .showcase {
      background: #0f3460;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }
    .showcase-number {
      font-size: 72px;
      font-weight: bold;
      color: #fbbf24;
    }
    .showcase-name {
      font-size: 36px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 15px 0;
    }
    .showcase-years {
      font-size: 22px;
      color: #aaa;
      margin-bottom: 15px;
    }
    .showcase-party {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .party-democrat { background: #3333ff; color: #fff; }
    .party-republican { background: #ff3333; color: #fff; }
    .party-whig { background: #999; color: #fff; }
    .party-federalist { background: #665533; color: #fff; }
    .party-democratic-republican { background: #6666aa; color: #fff; }
    .party-independent { background: #888; color: #fff; }
    
    .info-section {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
    }
    .section-title {
      font-size: 22px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 14px;
    }
    .info-text {
      font-size: 18px;
      line-height: 1.7;
      color: #ddd;
    }
    
    .nickname {
      font-size: 20px;
      color: #aaa;
      font-style: italic;
      margin-bottom: 15px;
    }
    
    .birth-death {
      font-size: 16px;
      color: #888;
      margin-bottom: 10px;
    }
    
    .prior-office, .prior-occupation {
      font-size: 16px;
      color: #ccc;
      margin-bottom: 8px;
    }
    
    .vice-presidents {
      font-size: 16px;
      color: #ccc;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 22px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 20px;
      text-align: center;
      padding: 30px;
    }
    
    .president-list::-webkit-scrollbar {
      width: 10px;
    }
    .president-list::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 5px;
    }
    .president-list::-webkit-scrollbar-thumb {
      background: #fbbf24;
      border-radius: 5px;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      min-width: 100px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #fbbf24;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #fbbf24;
      border-radius: 20px;
      padding: 24px 36px;
      max-width: 450px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #fbbf24;
      margin-bottom: 18px;
      font-size: 26px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: monospace;
      color: #fbbf24;
      font-size: 18px;
    }
    .shortcut-desc {
      color: #bbb;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 10px;
      }
      .pane {
        width: 100% !important;
        min-width: unset !important;
        max-height: 45vh;
      }
      .left-pane { order: 1; }
      .center-pane { order: 2; }
      .right-pane { order: 3; }
      .showcase-number {
        font-size: 48px;
      }
      .showcase-name {
        font-size: 28px;
      }
      .stats-bar {
        gap: 8px;
        padding: 12px;
      }
      .stats-bar .stat-item {
        padding: 8px 12px;
        min-width: 70px;
      }
      .stats-bar .stat-item .stat-label {
        font-size: 10px;
      }
      .stats-bar .stat-item .stat-number {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Study/Unstudy President</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="app-container">
    <div class="pane left-pane">
      <div class="pane-title">Unstudied Presidents</div>
      <input type="text" class="search-box" id="leftSearch" placeholder="Search Presidents...">
      <div class="president-list" id="leftList"></div>
    </div>
    
    <div class="pane center-pane">
      <div class="center-content" id="centerContent">
        <div class="empty-state">Click a President to learn about them!</div>
      </div>
    </div>
    
    <div class="pane right-pane">
      <div class="pane-title">Studied Presidents</div>
      <input type="text" class="search-box" id="rightSearch" placeholder="Search studied...">
      <div class="president-list" id="rightList"></div>
    </div>
  </div>

    let allPresidents = [...PRESIDENTS];
    let studiedPresidents = {};
    let failedPresidents = new Set();
    let selectedPresident = null;
    let selectedFromRight = false;
    let leftFocusedIndex = -1;
    let rightFocusedIndex = -1;
    
    const leftSearch = document.getElementById('leftSearch');
    const rightSearch = document.getElementById('rightSearch');
    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const centerContent = document.getElementById('centerContent');
    const statsBar = document.getElementById('statsBar');
    const shortcutsOverlay = document.getElementById('shortcutsOverlay');
    
    function loadStudiedPresidents() {
      const saved = localStorage.getItem('studiedPresidents');
      if (saved) {
        studiedPresidents = JSON.parse(saved);
      }
    }
    
    function saveStudiedPresidents() {
      localStorage.setItem('studiedPresidents', JSON.stringify(studiedPresidents));
    }
    
    function calculateStats() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      
      const studied = Object.keys(studiedPresidents).map(Number);
      
      const last24h = studied.filter(n => now - studiedPresidents[n] < day).length;
      const last7d = studied.filter(n => now - studiedPresidents[n] < 7 * day).length;
      const last30d = studied.filter(n => now - studiedPresidents[n] < 30 * day).length;
      const last365d = studied.filter(n => now - studiedPresidents[n] < 365 * day).length;
      
      statsBar.innerHTML = `
        <div class="stat-item highlight">
          <div class="stat-label">Studied</div>
          <div class="stat-number">${studied.length}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 24h</div>
          <div class="stat-number">${last24h}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 7d</div>
          <div class="stat-number">${last7d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 30d</div>
          <div class="stat-number">${last30d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 365d</div>
          <div class="stat-number">${last365d}</div>
        </div>
      `;
    }
    
    function getPartyClass(party) {
      return 'party-' + party;
    }
    
    function formatParty(party) {
      return party.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }
    
    function renderLeftList() {
      const query = leftSearch.value.toLowerCase();
      const unstudied = allPresidents.filter(p => !studiedPresidents[p.number] && !failedPresidents.has(p.number) && (p.name.toLowerCase().includes(query) || p.nickname.toLowerCase().includes(query)));
      
      leftList.innerHTML = unstudied.map((p, i) => `
        <div class="president-item ${selectedPresident?.number === p.number && !selectedFromRight ? 'selected' : ''} ${i === leftFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <div class="number">${p.number}</div>
          <div class="info">
            <div class="name">${p.name} - ${p.tenureYears}</div>
            <div class="years">${p.years}</div>
          </div>
        </div>
      `).join('');
      
      leftList.querySelectorAll('.president-item').forEach(item => {
        item.addEventListener('click', () => selectPresident(parseInt(item.dataset.number), false));
      });
    }
    
    function renderRightList() {
      const query = rightSearch.value.toLowerCase();
      const studied = allPresidents.filter(p => studiedPresidents[p.number] && (p.name.toLowerCase().includes(query) || p.nickname.toLowerCase().includes(query)));
      
      rightList.innerHTML = studied.map((p, i) => `
        <div class="president-item ${selectedPresident?.number === p.number && selectedFromRight ? 'selected' : ''} ${i === rightFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <div class="number">${p.number}</div>
          <div class="info">
            <div class="name">${p.name} - ${p.tenureYears}</div>
            <div class="years">${p.years}</div>
          </div>
        </div>
      `).join('');
      
      rightList.querySelectorAll('.president-item').forEach(item => {
        item.addEventListener('click', () => selectPresident(parseInt(item.dataset.number), true));
      });
    }
    
    function selectPresident(number, fromRight) {
      selectedPresident = allPresidents.find(p => p.number === number);
      selectedFromRight = fromRight;
      renderLeftList();
      renderRightList();
      showPresidentDetails(selectedPresident);
    }
    
    function showPresidentDetails(president) {
      centerContent.innerHTML = '<div class="loading">Loading...</div>';
      
      try {
        centerContent.innerHTML = `
          <button class="select-btn ${selectedFromRight ? 'unselect' : ''}" id="selectBtn">
            ${selectedFromRight ? 'Unstudy' : 'Study'}
          </button>
          
          <div class="showcase">
            <div class="showcase-header">
              <div class="showcase-number">${president.number}</div>
              <div class="showcase-name">${president.name}</div>
              <div class="showcase-years">${president.years} (${president.tenureYears} years)</div>
            </div>
            <img class="president-image" src="https://corsproxy.io/?${encodeURIComponent(president.image)}" alt="${president.name}" onerror="this.style.display='none'">
            <span class="showcase-party ${getPartyClass(president.party)}">${formatParty(president.party)}</span>
          </div>
          
          <div class="info-section">
            <div class="section-title">Nickname</div>
            <div class="nickname">${president.nickname}</div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Born - Died</div>
            <div class="birth-death">${president.birthDeath}</div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Prior Office</div>
            <div class="prior-office">${president.priorOffice}</div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Prior Occupation</div>
            <div class="prior-occupation">${president.priorOccupation}</div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Vice President${president.vicePresidents.length > 1 ? 's' : ''}</div>
            <div class="vice-presidents">${president.vicePresidents.join(', ')}</div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Key Accomplishments</div>
            <div class="info-text">${president.accomplishments}</div>
          </div>
          
          <div class="key-events">
            <div class="section-title">Key Events During Tenure</div>
            <ul>
              ${president.keyEvents.map(event => `<li>${event}</li>`).join('')}
            </ul>
          </div>
        `;
        
        document.getElementById('selectBtn').addEventListener('click', togglePresident);
        
      } catch (error) {
        failedPresidents.add(president.number);
        renderLeftList();
        centerContent.innerHTML = '<div class="empty-state">Error loading President details</div>';
        console.error(error);
      }
    }
    
    function togglePresident() {
      if (!selectedPresident) return;
      
      if (selectedFromRight) {
        delete studiedPresidents[selectedPresident.number];
      } else {
        studiedPresidents[selectedPresident.number] = Date.now();
      }
      
      saveStudiedPresidents();
      selectedFromRight = !selectedFromRight;
      calculateStats();
      renderLeftList();
      renderRightList();
      showPresidentDetails(selectedPresident);
    }
    
    let tabFocus = 'leftSearch';
    
    leftSearch.addEventListener('input', renderLeftList);
    rightSearch.addEventListener('input', renderRightList);
    
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        shortcutsOverlay.classList.toggle('visible');
        return;
      }
      
      if (shortcutsOverlay.classList.contains('visible')) {
        if (e.key === 'Escape') {
          shortcutsOverlay.classList.remove('visible');
        }
        return;
      }
      
      if (e.target === document.body || e.target === document.documentElement) {
        if (e.key === 'l' || e.key === 'L') {
          if (selectedPresident) {
            togglePresident();
          }
        } else if (e.key === '/') {
          e.preventDefault();
          leftSearch.focus();
        } else if (e.key === 'Escape') {
          leftSearch.value = '';
          rightSearch.value = '';
          renderLeftList();
          renderRightList();
          leftSearch.focus();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          leftSearch.value = '';
          leftSearch.blur();
          renderLeftList();
        }
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          rightSearch.value = '';
          rightSearch.blur();
          renderRightList();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftSearch') {
          tabFocus = 'leftList';
          leftFocusedIndex = 0;
          renderLeftList();
          const firstItem = leftList.querySelector('.president-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPresident(number, false);
          }
        } else if (tabFocus === 'rightList') {
          tabFocus = 'leftSearch';
          leftSearch.focus();
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftList') {
          tabFocus = 'rightSearch';
          rightSearch.focus();
        } else if (tabFocus === 'rightSearch') {
          tabFocus = 'rightList';
          rightFocusedIndex = 0;
          renderRightList();
          const firstItem = rightList.querySelector('.president-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPresident(number, true);
          }
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    function handleListKeydown(isLeft) {
      return (e) => {
        const list = isLeft ? leftList : rightList;
        
        if (e.key === 'Tab') {
          e.preventDefault();
          if (isLeft && tabFocus === 'leftList') {
            tabFocus = 'rightSearch';
            rightSearch.focus();
          } else if (!isLeft && tabFocus === 'rightList') {
            tabFocus = 'leftSearch';
            leftSearch.focus();
          }
        } else if (e.key === ' ') {
          e.preventDefault();
          const btn = document.getElementById('selectBtn');
          if (btn) btn.click();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const items = list.querySelectorAll('.president-item');
          if (isLeft) {
            leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
          } else {
            rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.president-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPresident(number, !isLeft);
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const items = list.querySelectorAll('.president-item');
          if (isLeft) {
            leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
          } else {
            rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.president-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPresident(number, !isLeft);
          }
        }
      };
    }
    
    leftList.addEventListener('keydown', handleListKeydown(true));
    rightList.addEventListener('keydown', handleListKeydown(false));
    
    document.addEventListener('keydown', (e) => {
      if (shortcutsOverlay.classList.contains('visible')) return;
      
      if (e.target.tagName === 'INPUT') return;
      
      const isLeft = tabFocus === 'leftList';
      const list = isLeft ? leftList : rightList;
      const items = list.querySelectorAll('.president-item');
      if (items.length === 0) return;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.president-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPresident(number, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.president-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPresident(number, !isLeft);
        }
      }
    });
    
    loadStudiedPresidents();
    calculateStats();
    renderLeftList();
    renderRightList();
  </script>
</body>
</html>
