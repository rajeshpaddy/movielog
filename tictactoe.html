<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            font-size: 1.3rem;
            margin-bottom: 25px;
            color: #aaa;
            height: 30px;
        }
        .status.winner { color: #4ade80; }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px;
            background: #0f3460;
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #16213e;
            border: none;
            border-radius: 10px;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cell:hover:not(.taken) {
            background: #1a3050;
            transform: scale(1.02);
        }
        .cell.x { color: #ff6b6b; }
        .cell.o { color: #4ade80; }
        .cell.taken { cursor: default; }
        .cell.winning {
            background: #1e3a2f;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .score {
            display: flex;
            gap: 40px;
            margin-bottom: 25px;
        }
        .score-item {
            text-align: center;
        }
        .score-value {
            font-size: 2rem;
            font-weight: bold;
        }
        .score-label {
            color: #888;
            font-size: 0.9rem;
        }
        .score-item.player .score-value { color: #ff6b6b; }
        .score-item.ai .score-value { color: #4ade80; }
        .score-item.draw .score-value { color: #feca57; }
    </style>
</head>
<body>
  <style id="app-home-link-style">
    .app-home-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 217, 255, 0.55);
      background: rgba(15, 52, 96, 0.92);
      color: #e6f9ff;
      text-decoration: none;
      font: 600 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      backdrop-filter: blur(4px);
    }
    .app-home-link:hover {
      background: rgba(26, 74, 122, 0.95);
    }
    .app-home-link:focus-visible {
      outline: 2px solid #00d9ff;
      outline-offset: 2px;
    }
  </style>
  <a class="app-home-link" href="app-catalog.html" title="Back to App Catalog">Home</a>
    <h1>Tic Tac Toe</h1>
    <div class="score">
        <div class="score-item player">
            <div class="score-value" id="playerScore">0</div>
            <div class="score-label">You (X)</div>
        </div>
        <div class="score-item draw">
            <div class="score-value" id="drawScore">0</div>
            <div class="score-label">Draws</div>
        </div>
        <div class="score-item ai">
            <div class="score-value" id="aiScore">0</div>
            <div class="score-label">AI (O)</div>
        </div>
    </div>
    <div class="status" id="status">Your turn!</div>
    <div class="board" id="board"></div>
    <button class="btn" onclick="resetGame()">New Game</button>

    <script>
        const board = document.getElementById('board');
        const status = document.getElementById('status');
        let cells = [];
        let gameState = Array(9).fill(null);
        let currentPlayer = 'X';
        let gameOver = false;
        let scores = { player: 0, ai: 0, draw: 0 };

        const WIN_COMBINATIONS = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        function init() {
            board.innerHTML = '';
            cells = [];
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('button');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleClick(i));
                board.appendChild(cell);
                cells.push(cell);
            }
        }

        function handleClick(index) {
            if (gameOver || gameState[index]) return;
            
            makeMove(index, 'X');
            
            if (!gameOver) {
                status.textContent = 'AI thinking...';
                setTimeout(aiMove, 400);
            }
        }

        function makeMove(index, player) {
            gameState[index] = player;
            cells[index].textContent = player;
            cells[index].classList.add(player.toLowerCase(), 'taken');
            
            const winner = checkWinner();
            if (winner) {
                endGame(winner);
            } else if (gameState.every(cell => cell)) {
                endGame('draw');
            } else {
                currentPlayer = player === 'X' ? 'O' : 'X';
                if (currentPlayer === 'X') {
                    status.textContent = 'Your turn!';
                }
            }
        }

        function aiMove() {
            const available = gameState.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (available.length === 0) return;
            
            const move = available[Math.floor(Math.random() * available.length)];
            makeMove(move, 'O');
        }

        function checkWinner() {
            for (const combo of WIN_COMBINATIONS) {
                const [a, b, c] = combo;
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    return { player: gameState[a], combo };
                }
            }
            return null;
        }

        function endGame(result) {
            gameOver = true;
            if (result === 'draw') {
                status.textContent = "It's a draw!";
                scores.draw++;
                document.getElementById('drawScore').textContent = scores.draw;
            } else {
                const winner = result.player === 'X' ? 'You' : 'AI';
                status.textContent = `${winner} win!`;
                status.classList.add('winner');
                
                if (result.player === 'X') {
                    scores.player++;
                    document.getElementById('playerScore').textContent = scores.player;
                } else {
                    scores.ai++;
                    document.getElementById('aiScore').textContent = scores.ai;
                }
                
                result.combo.forEach(i => cells[i].classList.add('winning'));
            }
        }

        function resetGame() {
            gameState = Array(9).fill(null);
            currentPlayer = 'X';
            gameOver = false;
            status.textContent = 'Your turn!';
            status.classList.remove('winner');
            init();
        }

        init();
    </script>
  <script src="shared-store-config.js"></script>
  <script src="shared-store.js"></script>
  <script>window.APP_TELEMETRY_ID = "tic-tac-toe";</script>
  <script src="app-telemetry.js" defer></script>
</body>
</html>
