<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USA State Learner</title>
  <style>
    :root { --status-h: 78px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #e5e7eb;
      min-height: 100vh;
      padding-bottom: calc(var(--status-h) + 10px);
    }
    .app {
      display: flex;
      gap: 12px;
      padding: 12px;
      height: calc(100dvh - var(--status-h) - 10px);
      overflow: hidden;
    }
    .pane {
      background: #1f2937;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .side { width: 300px; flex-shrink: 0; }
    .center { flex: 1; min-width: 360px; }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #22d3ee;
      margin-bottom: 10px;
      text-align: center;
    }
    .search, .region-filter {
      width: 100%;
      border: 1px solid #0ea5e9;
      background: #0f172a;
      color: #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .transfer-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .transfer-btn {
      flex: 1;
      border: 1px solid #22d3ee;
      border-radius: 10px;
      background: #0f172a;
      color: #a5f3fc;
      font-size: 18px;
      font-weight: 700;
      min-height: 34px;
      cursor: pointer;
    }
    .transfer-status {
      min-height: 16px;
      font-size: 11px;
      color: #93c5fd;
      margin-bottom: 6px;
      text-align: center;
    }
    .transfer-status.error { color: #fca5a5; }
    .list {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .list::-webkit-scrollbar {
      width: 0;
      height: 0;
    }
    .item {
      background: #0f172a;
      border: 1px solid #1f3a5f;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }
    .item.selected {
      background: #06b6d4;
      color: #082f49;
      border-color: #67e8f9;
    }
    .item-name { font-size: 14px; font-weight: 700; }
    .item-sub { font-size: 12px; opacity: 0.8; }

    .stats {
      background: #0f172a;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .stat {
      background: #1f2937;
      border: 1px solid #1f3a5f;
      border-radius: 10px;
      min-width: 90px;
      padding: 8px;
      text-align: center;
    }
    .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
    .stat-value { font-size: 18px; font-weight: 700; color: #22d3ee; }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .mode-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0f172a;
      border: 1px solid #1f3a5f;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    .mode-switch {
      appearance: none;
      width: 42px;
      height: 22px;
      border-radius: 999px;
      background: #334155;
      position: relative;
      cursor: pointer;
    }
    .mode-switch::after {
      content: '';
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e2e8f0;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .mode-switch:checked { background: #0891b2; }
    .mode-switch:checked::after { transform: translateX(20px); }
    .visit-btn {
      border: none;
      border-radius: 8px;
      background: #10b981;
      color: #052e2b;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .visit-btn.remove { background: #ef4444; color: #fff; }

    .map-wrap {
      flex: 1;
      min-height: 280px;
      background: #0b1220;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    .map-img, .map-svg, .map-markers {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 0.15s ease-out;
    }
    .map-img { object-fit: cover; opacity: 0.95; }
    .map-markers { z-index: 2; }
    .map-svg { z-index: 3; display: none; background: #0b1220; }
    .map-wrap.accurate .map-svg { display: block; }
    .map-wrap.accurate .map-img,
    .map-wrap.accurate .map-markers { display: none; }

    .shade {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .shade.visited {
      background: radial-gradient(circle, rgba(16,185,129,0.6) 0%, rgba(16,185,129,0.2) 60%, rgba(16,185,129,0) 80%);
      box-shadow: 0 0 14px rgba(16,185,129,0.8);
    }
    .shade.selected {
      width: 34px;
      height: 34px;
      background: radial-gradient(circle, rgba(139,92,246,0.8) 0%, rgba(139,92,246,0.2) 60%, rgba(139,92,246,0) 82%);
      box-shadow: 0 0 16px rgba(139,92,246,0.9);
    }

    .region-shape {
      fill: #1d4d80;
      stroke: #2b6aa8;
      stroke-width: 0.5;
      vector-effect: non-scaling-stroke;
    }
    .region-shape.visited { fill: #16a34a; stroke: #4ade80; }
    .region-shape.selected { fill: #8b5cf6; stroke: #c4b5fd; }

    .detail-panel {
      margin-top: 10px;
      background: #0f172a;
      border: 1px solid #1f3a5f;
      border-radius: 14px;
      padding: 12px;
      max-height: 300px;
      overflow: auto;
    }
    .detail-panel.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: 14px;
      min-height: 110px;
    }
    .detail-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .detail-title {
      font-size: 20px;
      font-weight: 800;
      color: #f8fafc;
    }
    .detail-subtitle {
      font-size: 12px;
      color: #93c5fd;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }
    .detail-card {
      background: #111c31;
      border: 1px solid #223553;
      border-radius: 12px;
      padding: 10px;
    }
    .detail-card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #67e8f9;
      margin-bottom: 8px;
    }
    .detail-line {
      font-size: 13px;
      line-height: 1.4;
      color: #dbeafe;
      margin-bottom: 6px;
    }
    .detail-line:last-child { margin-bottom: 0; }
    .detail-line strong { color: #f8fafc; }

    .status {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      min-height: var(--status-h);
      border-radius: 12px;
      background: linear-gradient(135deg, #0ea5e9 0%, #14b8a6 100%);
      border: 1px solid #67e8f9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      z-index: 50;
    }
    .status-track {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .status-item {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      color: #fff;
    }

    @media (max-width: 1000px) {
      .app { flex-direction: column; height: auto; min-height: calc(100dvh - var(--status-h) - 10px); }
      .side, .center { width: 100%; min-width: 0; }
      .pane { max-height: none; }
      .map-wrap { min-height: 320px; }
    }
  </style>
</head>

    function setTransferStatus(message, isError = false) {
      transferStatus.textContent = message;
      transferStatus.classList.toggle('error', !!isError);
    }

    function saveVisited() {
      localStorage.setItem(STORE_KEY, JSON.stringify(visited));
    }

    function getRegions() {
      return ['all', ...Array.from(new Set(DATA.map(d => d.region)))];
    }

    function renderRegionFilters() {
      const options = getRegions().map(r => `<option value="${r}">${r === 'all' ? 'All Regions' : r.replace('-', ' ')}</option>`).join('');
      leftRegionSel.innerHTML = options;
      rightRegionSel.innerHTML = options;
      leftRegionSel.value = leftRegion;
      rightRegionSel.value = rightRegion;
    }

    function renderStats() {
      const total = DATA.length;
      const done = Object.keys(visited).length;
      const pct = Math.round((done / total) * 100);
      stats.innerHTML = `
        <div class="stat"><div class="stat-label">Visited</div><div class="stat-value">${done}</div></div>
        <div class="stat"><div class="stat-label">Progress</div><div class="stat-value">${pct}%</div></div>
        <div class="stat"><div class="stat-label">Total</div><div class="stat-value">${total}</div></div>
      `;
    }

    function filterItems(source, query, region, onlyVisited) {
      return source.filter(item => {
        if (onlyVisited && !visited[item.code]) return false;
        if (!onlyVisited && visited[item.code]) return false;
        if (region !== 'all' && item.region !== region) return false;
        const q = query.toLowerCase();
        return item.name.toLowerCase().includes(q) || item.code.toLowerCase().includes(q) || item.capital.toLowerCase().includes(q);
      });
    }

    function renderList(target, items) {
      if (items.length === 0) {
        target.innerHTML = '<div class="item"><div class="item-sub">No results</div></div>';
        return;
      }
      target.innerHTML = items.map(item => `
        <div class="item ${item.code === selectedCode ? 'selected' : ''}" data-code="${item.code}">
          <div class="item-name">${item.name}</div>
          <div class="item-sub">${item.code} • ${item.capital}</div>
        </div>
      `).join('');
      target.querySelectorAll('.item').forEach(node => {
        node.addEventListener('click', () => selectItem(node.dataset.code));
      });
    }

    function renderLists() {
      renderList(leftList, filterItems(DATA, leftQuery, leftRegion, false));
      renderList(rightList, filterItems(DATA, rightQuery, rightRegion, true));
    }

    function selectItem(code) {
      selectedCode = code;
      localStorage.setItem('lastUSState', code);
      renderLists();
      renderVisitButton();
      renderStatus();
      renderDetailPanel();
      scheduleMapRender();
    }

    function renderVisitButton() {
      const selected = codeToState[selectedCode];
      if (!selected) {
        visitBtn.textContent = 'MARK VISITED';
        visitBtn.classList.remove('remove');
        visitBtn.disabled = true;
        return;
      }
      const isVisited = !!visited[selectedCode];
      visitBtn.disabled = false;
      visitBtn.textContent = isVisited ? 'REMOVE FROM VISITED' : 'MARK VISITED';
      visitBtn.classList.toggle('remove', isVisited);
    }

    function renderStatus() {
      const item = codeToState[selectedCode];
      if (!item) {
        statusBar.innerHTML = '<div class="status-track"><div class="status-item">Select a state</div></div>';
        return;

      statusBar.innerHTML = `

          <div class="status-item">Code: ${item.code}</div>
          <div class="status-item">Capital: ${item.capital}</div>

          <div class="status-item">Status: ${visited[item.code] ? 'Visited' : 'Not Visited'}</div>
        </div>
      `;
    }

            ${detailLine('Demographics', item.demographics)}
            ${detailLine('Major airports', item.majorAirports)}
          </div>
          <div class="detail-card">
            <div class="detail-card-title">Politics & Leaders</div>
            ${detailLine('Blue / Red', item.politicalLean)}
            ${detailLine('Governor', item.governor)}
            ${detailLine('Senators', item.senators)}
            ${detailLine('LGBT climate', item.lgbtClimate)}
          </div>
          <div class="detail-card">
            <div class="detail-card-title">Law & Household Rules</div>
            ${detailLine('Abortion law', item.abortionLaw)}
            ${detailLine('Auto system', item.autoSystem)}
            ${detailLine('Community property', item.communityProperty)}
          </div>
          <div class="detail-card">
            <div class="detail-card-title">Economy Snapshot</div>
            ${detailLine('Booming industry', item.boomingIndustry)}
            ${detailLine('Top challenges', item.topChallenges)}
          </div>
        </div>
      `;
    }

    function toggleVisited() {
      if (!selectedCode) return;
      if (visited[selectedCode]) {
        delete visited[selectedCode];
      } else {
        visited[selectedCode] = Date.now();
      }
      saveVisited();
      renderStats();
      renderLists();
      renderVisitButton();
      renderStatus();
      renderDetailPanel();
      scheduleMapRender();
    }

    function projectApprox(item) {
      const rect = mapWrap.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      if (typeof item.mapX === 'number' && typeof item.mapY === 'number') {
        return { x: item.mapX * rect.width, y: item.mapY * rect.height };
      }
      const lngMin = -125;
      const lngMax = -66;
      const latTop = 50;
      const latBottom = 24;
      const xNorm = (item.lng - lngMin) / (lngMax - lngMin);
      const yNorm = (latTop - item.lat) / (latTop - latBottom);
      return {
        x: Math.max(0, Math.min(1, xNorm)) * rect.width,
        y: Math.max(0, Math.min(1, yNorm)) * rect.height
      };
    }

    function renderApproxMap() {
      const html = [];
      Object.keys(visited).forEach(code => {
        const item = codeToState[code];
        if (!item) return;
        const p = projectApprox(item);
        if (!p) return;
        html.push(`<div class="shade visited" style="left:${p.x}px;top:${p.y}px"></div>`);
      });
      if (selectedCode && codeToState[selectedCode]) {
        const p = projectApprox(codeToState[selectedCode]);
        if (p) html.push(`<div class="shade selected" style="left:${p.x}px;top:${p.y}px"></div>`);
      }
      mapMarkers.innerHTML = html.join('');
    }

    function ensureScript(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing && existing.dataset.loaded === '1') { resolve(); return; }
        if (existing) {
          existing.addEventListener('load', () => resolve(), { once: true });
          existing.addEventListener('error', () => reject(new Error('Script load failed')), { once: true });
          return;
        }
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onload = () => { s.dataset.loaded = '1'; resolve(); };
        s.onerror = () => reject(new Error('Script load failed'));
        document.head.appendChild(s);
      });
    }

    async function ensureAccurateMap() {
      if (accurateReady) return true;
      try {
        if (!d3Ready) d3Ready = ensureScript('https://cdn.jsdelivr.net/npm/d3@7');
        if (!topoReady) topoReady = ensureScript('https://cdn.jsdelivr.net/npm/topojson-client@3');
        await Promise.all([d3Ready, topoReady]);

        const res = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
        if (!res.ok) throw new Error('map data failed');
        const topo = await res.json();
        const features = topojson.feature(topo, topo.objects.states).features;

        const projection = d3.geoAlbersUsa().fitExtent([[8, 8], [992, 592]], { type: 'FeatureCollection', features });
        const path = d3.geoPath(projection);

        mapSvg.innerHTML = '';
        regionsByCode.clear();

        features.forEach(feature => {
          const code = FIPS_TO_CODE[Number(feature.id)];
          if (!code) return;
          const d = path(feature);
          if (!d) return;
          const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          p.setAttribute('d', d);
          p.classList.add('region-shape');
          p.dataset.code = code;
          mapSvg.appendChild(p);
          const list = regionsByCode.get(code) || [];
          list.push(p);
          regionsByCode.set(code, list);
        });

        accurateReady = true;
        return true;
      } catch (error) {
        return false;
      }
    }

    function renderAccurateStyles() {
      regionsByCode.forEach((nodes, code) => {
        const isVisited = !!visited[code];
        const isSelected = code === selectedCode;
        nodes.forEach(node => {
          node.classList.toggle('visited', isVisited);
          node.classList.toggle('selected', isSelected);
        });
      });
    }

    let mapRaf = 0;
    function scheduleMapRender() {
      if (mapRaf) return;
      mapRaf = requestAnimationFrame(async () => {
        mapRaf = 0;
        if (mapMode === 'accurate') {
          const ok = await ensureAccurateMap();
          if (!ok) {
            mapMode = 'approx';
            localStorage.setItem(MODE_KEY, mapMode);
            applyMapMode();
            renderApproxMap();
            return;
          }
          renderAccurateStyles();
        } else {
          renderApproxMap();
        }
      });
    }

    function applyMapMode() {
      mapWrap.classList.toggle('accurate', mapMode === 'accurate');
      mapModeSwitch.checked = mapMode === 'accurate';
    }

    function exportData() {
      const payload = {
        app: 'usa-state-learner',
        version: 1,
        exportedAt: new Date().toISOString(),
        visited
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `usa-states-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      setTransferStatus(`Exported ${Object.keys(visited).length} states`);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const source = parsed?.visited ?? parsed;
          if (!source || typeof source !== 'object' || Array.isArray(source)) throw new Error('Invalid format');
          const next = {};
          Object.entries(source).forEach(([k, v]) => {
            const code = String(k).toUpperCase();
            if (!codeToState[code]) return;
            if (v === false || v == null) return;
            next[code] = typeof v === 'number' ? v : Date.now();
          });
          if (Object.keys(next).length === 0) throw new Error('No valid states in file');
          visited = next;
          saveVisited();
          renderStats();
          renderLists();
          renderVisitButton();
          renderStatus();
          renderDetailPanel();
          scheduleMapRender();
          setTransferStatus(`Imported ${Object.keys(visited).length} states`);
        } catch (error) {
          setTransferStatus(error.message || 'Import failed', true);
        }
        importFile.value = '';
      };
      reader.onerror = () => {
        setTransferStatus('Unable to read file', true);
        importFile.value = '';
      };
      reader.readAsText(file);
    }

    function promptSharedKeyword(label) {
      const raw = prompt(`${label}: enter a keyword`, '');
      if (raw == null) return '';
      const normalized = String(raw).trim().toLowerCase().replaceAll(/\s+/g, '-').replaceAll(/[^a-z0-9-_]/g, '');
      if (!normalized) {
        setTransferStatus('Keyword is required for shared transfer.', true);
      }
      return normalized;
    }

    function buildSharedKey(keyword) {
      let hash = 2166136261;
      for (let i = 0; i < keyword.length; i += 1) {
        hash ^= keyword.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      const shortKeyword = keyword.slice(0, 16).replace(/^-+|-+$/g, '') || 'share';
      return `usst-${shortKeyword}-${(hash >>> 0).toString(36).slice(0, 6)}`;
    }

    async function exportSharedData() {
      const keyword = promptSharedKeyword('Shared export');
      if (!keyword) return;
      const key = buildSharedKey(keyword);
      const payload = {
        app: 'usa-state-learner',
        version: 1,
        exportedAt: new Date().toISOString(),
        visited
      };
      try {
        let response = await fetch(SETGET_SET_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, content: payload, expireAfter: 604800 })
        });
        let text = await response.text();
        if (!response.ok && response.status === 422 && text.includes('expireAfter')) {
          response = await fetch(SETGET_SET_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, content: payload })
          });
          text = await response.text();
        }
        if (!response.ok) throw new Error(`Shared export failed (${response.status})${text ? `: ${text}` : ''}`);
        setTransferStatus(`Shared export complete (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared export failed', true);
      }
    }

    async function importSharedData() {
      const keyword = promptSharedKeyword('Shared import');
      if (!keyword) return;
      const key = buildSharedKey(keyword);
      try {
        const response = await fetch(`${SETGET_GET_BASE}/${encodeURIComponent(key)}`);
        const text = await response.text();
        if (!response.ok) throw new Error(`Shared import failed (${response.status})${text ? `: ${text}` : ''}`);
        const parsed = JSON.parse(text);
        const source = parsed?.content?.visited ?? parsed?.visited ?? parsed?.content ?? parsed;
        if (!source || typeof source !== 'object' || Array.isArray(source)) throw new Error('Invalid format');
        const next = {};
        Object.entries(source).forEach(([k, v]) => {
          const code = String(k).toUpperCase();
          if (!codeToState[code]) return;
          if (v === false || v == null) return;
          next[code] = typeof v === 'number' ? v : Date.now();
        });
        if (Object.keys(next).length === 0) throw new Error('No valid states in shared data');
        visited = next;
        saveVisited();
        renderStats();
        renderLists();
        renderVisitButton();
        renderStatus();
        renderDetailPanel();
        scheduleMapRender();
        setTransferStatus(`Shared import complete (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared import failed', true);
      }
    }

    async function clearSharedData() {
      const keyword = promptSharedKeyword('Clear shared');
      if (!keyword) return;
      const key = buildSharedKey(keyword);
      const payload = {
        app: 'usa-state-learner',
        version: 1,
        clearedAt: new Date().toISOString(),
        visited: {}
      };
      try {
        let response = await fetch(SETGET_SET_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key, content: payload, expireAfter: 60 })
        });
        let text = await response.text();
        if (!response.ok && response.status === 422 && text.includes('expireAfter')) {
          response = await fetch(SETGET_SET_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, content: payload })
          });
          text = await response.text();
        }
        if (!response.ok) throw new Error(`Shared clear failed (${response.status})${text ? `: ${text}` : ''}`);
        setTransferStatus(`Shared key cleared (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared clear failed', true);
      }
    }

    leftSearch.addEventListener('input', e => { leftQuery = e.target.value; renderLists(); });
    rightSearch.addEventListener('input', e => { rightQuery = e.target.value; renderLists(); });
    leftRegionSel.addEventListener('change', e => { leftRegion = e.target.value; renderLists(); });
    rightRegionSel.addEventListener('change', e => { rightRegion = e.target.value; renderLists(); });
    visitBtn.addEventListener('click', toggleVisited);

    mapModeSwitch.addEventListener('change', e => {
      mapMode = e.target.checked ? 'accurate' : 'approx';
      localStorage.setItem(MODE_KEY, mapMode);
      applyMapMode();
      scheduleMapRender();
    });

    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => {
      const [file] = e.target.files || [];
      if (file) importData(file);
    });
    exportSharedBtn.addEventListener('click', exportSharedData);
    clearSharedBtn.addEventListener('click', clearSharedData);
    importSharedBtn.addEventListener('click', importSharedData);

    window.addEventListener('resize', scheduleMapRender);
    mapImg.addEventListener('load', scheduleMapRender);

    renderRegionFilters();
    renderStats();
    renderLists();
    applyMapMode();

    const last = localStorage.getItem('lastUSState');
    if (last && codeToState[last]) {
      selectItem(last);
    } else {
      renderVisitButton();
      renderStatus();
      renderDetailPanel();
      scheduleMapRender();
    }
  </script>
</body>
