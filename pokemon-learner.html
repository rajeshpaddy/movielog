<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
      overflow-x: hidden;
    }
    .app-container { 
      display: flex; 
      height: 100vh; 
      gap: 12px; 
      padding: 12px; 
    }
    .pane { 
      background: #16213e; 
      border-radius: 20px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 320px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 350px;
    }
    .app-container.left-collapsed .left-pane,
    .app-container.right-collapsed .right-pane {
      display: none;
    }
    .app-container.left-collapsed .center-pane,
    .app-container.right-collapsed .center-pane {
      min-width: 0;
    }
    .pane-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #00d9ff;
      text-align: center;
    }
    .pane-toggle-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .pane-toggle-btn {
      border: 1px solid #00d9ff;
      background: #0f3460;
      color: #d6f8ff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .pane-toggle-btn:hover {
      background: #1a4a7a;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 2px solid #00d9ff;
      color: #fff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: #888; }
    .search-box:focus { outline: none; box-shadow: 0 0 15px rgba(0, 217, 255, 0.4); }
    .transfer-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .transfer-btn {
      flex: 1;
      border: 1px solid #00d9ff;
      background: #0f3460;
      color: #d6f8ff;
      padding: 9px 10px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .transfer-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .transfer-btn:hover {
      background: #1a4a7a;
    }
    .transfer-status {
      min-height: 18px;
      margin-bottom: 10px;
      color: #93c5fd;
      font-size: 12px;
      text-align: center;
    }
    .transfer-status.error {
      color: #fca5a5;
    }
    .pokemon-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .pokemon-item {
      background: #0f3460;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pokemon-item:hover { 
      background: #1a4a7a; 
      transform: translateX(5px);
    }
    .pokemon-item.selected {
      background: #00d9ff;
      color: #1a1a2e;
    }
    .pokemon-item.focused {
      outline: 3px solid #00d9ff;
      outline-offset: -3px;
    }
    .pokemon-item img {
      width: 56px;
      height: 56px;
    }
    .pokemon-item .name {
      font-weight: 600;
      font-size: 18px;
      text-transform: capitalize;
    }
    .pokemon-item .number {
      font-size: 16px;
      opacity: 0.8;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .select-btn {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.5);
    }
    .select-btn.unselect {
      background: #ff6b6b;
    }
    .showcase {
      background: #0f3460;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }
    .showcase-image {
      width: 280px;
      height: 280px;
      object-fit: contain;
    }
    .showcase-name {
      font-size: 36px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 20px 0;
    }
    .showcase-types {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .showcase-region {
      font-size: 18px;
      color: #9fd9ff;
      margin: -6px 0 16px;
    }
    .type-badge {
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 18px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .type-normal { background: #A8A77A; color: #1a1a2e; }
    .type-fire { background: #EE8130; color: #fff; }
    .type-water { background: #6390F0; color: #fff; }
    .type-electric { background: #F7D02C; color: #1a1a2e; }
    .type-grass { background: #7AC74C; color: #1a1a2e; }
    .type-ice { background: #96D9D6; color: #1a1a2e; }
    .type-fighting { background: #C22E28; color: #fff; }
    .type-poison { background: #A33EA1; color: #fff; }
    .type-ground { background: #E2BF65; color: #1a1a2e; }
    .type-flying { background: #A98FF3; color: #1a1a2e; }
    .type-psychic { background: #F95587; color: #fff; }
    .type-bug { background: #A6B91A; color: #1a1a2e; }
    .type-rock { background: #B6A136; color: #1a1a2e; }
    .type-ghost { background: #735797; color: #fff; }
    .type-dragon { background: #6F35FC; color: #fff; }
    .type-dark { background: #705746; color: #fff; }
    .type-steel { background: #B7B7CE; color: #1a1a2e; }
    .type-fairy { background: #D685AD; color: #1a1a2e; }
    
    .stats-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 20px 0;
    }
    .stat-box {
      background: #16213e;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
    }
    .stat-name {
      font-size: 15px;
      color: #aaa;
      text-transform: capitalize;
    }
    .stat-value {
      font-size: 26px;
      font-weight: bold;
      color: #00d9ff;
    }
    
    .abilities-section, .evolution-section, .description-section {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
    }
    .section-title {
      font-size: 22px;
      font-weight: bold;
      color: #00d9ff;
      margin-bottom: 14px;
    }
    .ability-tag {
      display: inline-block;
      background: #1a4a7a;
      padding: 8px 16px;
      border-radius: 20px;
      margin: 5px;
      font-size: 17px;
    }
    .ability-tag.hidden {
      background: #7a1a4a;
    }
    
    .evolution-chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .evolution-item {
      text-align: center;
      cursor: pointer;
    }
    .evolution-item:hover img {
      transform: scale(1.1);
    }
    .evolution-item:focus {
      outline: 3px solid #00d9ff;
      outline-offset: 6px;
      border-radius: 15px;
    }
    .evolution-item img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      transition: transform 0.2s;
    }
    .evolution-item .name {
      font-size: 18px;
      text-transform: capitalize;
      margin-top: 8px;
    }
    .evolution-arrow {
      font-size: 30px;
      color: #999;
    }
    .evolution-trigger {
      font-size: 15px;
      color: #777;
    }
    
    .flavor-text {
      font-size: 18px;
      line-height: 1.7;
      color: #ddd;
    }
    
    .height-weight {
      display: flex;
      gap: 30px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .hw-item {
      text-align: center;
    }
    .hw-label {
      font-size: 16px;
      color: #999;
    }
    .hw-value {
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 22px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 20px;
      text-align: center;
      padding: 30px;
    }
    
    .pokemon-list::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      min-width: 100px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .region-stats {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .region-stat {
      background: #0f3460;
      padding: 10px 18px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .region-stat .region-name {
      font-size: 15px;
      color: #bbb;
      text-transform: capitalize;
    }
    .region-stat .region-count {
      font-size: 20px;
      font-weight: bold;
      color: #00d9ff;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 10px;
      }
      .pane {
        width: 100% !important;
        min-width: unset !important;
        max-height: 45vh;
      }
      .left-pane { order: 1; }
      .center-pane { order: 2; }
      .right-pane { order: 3; }
      .showcase-image {
        width: 200px;
        height: 200px;
      }
      .showcase-name {
        font-size: 28px;
      }
      .stats-bar {
        gap: 8px;
        padding: 12px;
      }
      .stats-bar .stat-item {
        padding: 8px 12px;
        min-width: 70px;
      }
      .stats-bar .stat-item .stat-label {
        font-size: 10px;
      }
      .stats-bar .stat-item .stat-number {
        font-size: 18px;
      }
      .region-stats {
        gap: 6px;
        padding: 10px;
      }
      .region-stat {
        padding: 6px 10px;
      }
      .region-stat .region-name {
        font-size: 12px;
      }
      .region-stat .region-count {
        font-size: 14px;
      }
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #00d9ff;
      border-radius: 20px;
      padding: 24px 36px;
      max-width: 450px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #00d9ff;
      margin-bottom: 18px;
      font-size: 26px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: monospace;
      color: #00d9ff;
      font-size: 18px;
    }
    .shortcut-desc {
      color: #bbb;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <style id="app-home-link-style">
    .app-home-link {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0, 217, 255, 0.55);
      background: rgba(15, 52, 96, 0.92);
      color: #e6f9ff;
      text-decoration: none;
      font: 600 14px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      backdrop-filter: blur(4px);
    }
    .app-home-link:hover {
      background: rgba(26, 74, 122, 0.95);
    }
    .app-home-link:focus-visible {
      outline: 2px solid #00d9ff;
      outline-offset: 2px;
    }
  </style>
  <a class="app-home-link" href="app-catalog.html" title="Back to App Catalog">Home</a>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Learn/Unlearn Pokemon</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">View evolution</span><span class="shortcut-key">Enter</span></div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="region-stats" id="regionStats"></div>
  <div class="app-container">
    <div class="pane left-pane">
      <div class="pane-title">Unlearned Pokemon</div>
      <input type="text" class="search-box" id="leftSearch" placeholder="Search Pokemon or region...">
      <div class="pokemon-list" id="leftList"></div>
    </div>
    
    <div class="pane center-pane">
      <div class="pane-toggle-controls">
        <button type="button" class="pane-toggle-btn" id="toggleLeftPaneBtn" aria-label="Toggle left pane">Hide Left Pane</button>
        <button type="button" class="pane-toggle-btn" id="toggleRightPaneBtn" aria-label="Toggle right pane">Hide Right Pane</button>
        <button type="button" class="pane-toggle-btn" id="toggleImageThemeBtn" aria-label="Toggle Pokemon icon theme">Icon Theme: 30th</button>
      </div>
      <div class="center-content" id="centerContent">
        <div class="empty-state">Click a Pokemon to learn about it!</div>
      </div>
    </div>
    
    <div class="pane right-pane">
      <div class="pane-title">Learned Pokemon</div>
      <div class="transfer-actions">
        <button type="button" class="transfer-btn" id="exportLearnedBtn" aria-label="Export learned Pokemon" title="Export learned Pokemon">⤓</button>
        <button type="button" class="transfer-btn" id="importLearnedBtn" aria-label="Import learned Pokemon" title="Import learned Pokemon">⤒</button>
        <button type="button" class="transfer-btn" id="exportSharedLearnedBtn" aria-label="Export learned Pokemon to cloud" title="Export learned Pokemon to cloud">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 18a4 4 0 1 1 .8-7.92A5.5 5.5 0 0 1 18.5 11 3.5 3.5 0 1 1 18 18Z"></path>
            <path d="M12 15V8"></path>
            <path d="m9.5 10.5 2.5-2.5 2.5 2.5"></path>
          </svg>
        </button>
        <button type="button" class="transfer-btn" id="clearSharedLearnedBtn" aria-label="Clear shared learned Pokemon" title="Clear shared learned Pokemon">✕</button>
        <button type="button" class="transfer-btn" id="importSharedLearnedBtn" aria-label="Import learned Pokemon from cloud" title="Import learned Pokemon from cloud">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 18a4 4 0 1 1 .8-7.92A5.5 5.5 0 0 1 18.5 11 3.5 3.5 0 1 1 18 18Z"></path>
            <path d="M12 9v7"></path>
            <path d="m9.5 13.5 2.5 2.5 2.5-2.5"></path>
          </svg>
        </button>
        <input type="file" id="importLearnedFile" accept="application/json" hidden>
      </div>
      <div class="transfer-status" id="transferStatus" aria-live="polite"></div>
      <input type="text" class="search-box" id="rightSearch" placeholder="Search learned or region...">
      <div class="pokemon-list" id="rightList"></div>
    </div>
  </div>

  <script src="shared-store-config.js"></script>
  <script src="shared-store.js"></script>
  <script>
    const POKEMON_API = 'https://pokeapi.co/api/v2';
    const TOTAL_POKEMON = 1025;
    const ANNIVERSARY_IMAGE_TEMPLATE = 'https://www.pokemon.co.jp/ex/30th_logo/assets/img/download/{num}.png';
    const POKEMON_SPRITE_TEMPLATE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/{num}.png';
    const POKEMON_ARTWORK_TEMPLATE = 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/{num}.png';
    const IMAGE_THEME_KEY = 'pokemonLearnerImageTheme';
    const POKEMON_CACHE_KEY = 'pokemonLearnerAllPokemonCache';
    const IMAGE_THEMES = {
      NORMAL: 'normal',
      ANNIVERSARY: '30th'
    };
    
    const REGIONS = [
      { name: 'Kanto', start: 1, end: 151 },
      { name: 'Johto', start: 152, end: 251 },
      { name: 'Hoenn', start: 252, end: 386 },
      { name: 'Sinnoh', start: 387, end: 493 },
      { name: 'Unova', start: 494, end: 649 },
      { name: 'Kalos', start: 650, end: 721 },
      { name: 'Alola', start: 722, end: 809 },
      { name: 'Galar', start: 810, end: 905 },
      { name: 'Paldea', start: 906, end: 1025 }
    ];
    
    function safeGetItem(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        console.warn('Storage read failed:', key, error);
        return null;
      }
    }

    function safeSetItem(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (error) {
        console.warn('Storage write failed:', key, error);
        return false;
      }
    }

    let allPokemon = [];
    let learnedPokemon = {};
    let failedPokemon = new Set();
    let selectedPokemon = null;
    let selectedFromRight = false;
    let leftFocusedIndex = -1;
    let rightFocusedIndex = -1;
    
    const leftSearch = document.getElementById('leftSearch');
    const rightSearch = document.getElementById('rightSearch');
    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const appContainer = document.querySelector('.app-container');
    const centerContent = document.getElementById('centerContent');
    const toggleLeftPaneBtn = document.getElementById('toggleLeftPaneBtn');
    const toggleRightPaneBtn = document.getElementById('toggleRightPaneBtn');
    const toggleImageThemeBtn = document.getElementById('toggleImageThemeBtn');
    const statsBar = document.getElementById('statsBar');
    const regionStats = document.getElementById('regionStats');
    const shortcutsOverlay = document.getElementById('shortcutsOverlay');
    const exportLearnedBtn = document.getElementById('exportLearnedBtn');
    const importLearnedBtn = document.getElementById('importLearnedBtn');
    const exportSharedLearnedBtn = document.getElementById('exportSharedLearnedBtn');
    const clearSharedLearnedBtn = document.getElementById('clearSharedLearnedBtn');
    const importSharedLearnedBtn = document.getElementById('importSharedLearnedBtn');
    const importLearnedFile = document.getElementById('importLearnedFile');
    const transferStatus = document.getElementById('transferStatus');
    let leftPaneCollapsed = false;
    let rightPaneCollapsed = false;
    let imageTheme = safeGetItem(IMAGE_THEME_KEY) === IMAGE_THEMES.NORMAL
      ? IMAGE_THEMES.NORMAL
      : IMAGE_THEMES.ANNIVERSARY;

    function getPokemonSpriteUrl(number) {
      return POKEMON_SPRITE_TEMPLATE.replace('{num}', String(number));
    }

    function getPokemonArtworkUrl(number) {
      return POKEMON_ARTWORK_TEMPLATE.replace('{num}', String(number));
    }

    function getPrimarySearchTarget() {
      if (!leftPaneCollapsed) return leftSearch;
      if (!rightPaneCollapsed) return rightSearch;
      return null;
    }

    function focusPrimarySearch() {
      const primarySearch = getPrimarySearchTarget();
      if (!primarySearch) return;
      tabFocus = primarySearch === rightSearch ? 'rightSearch' : 'leftSearch';
      primarySearch.focus();
    }

    function syncPaneButtons() {
      if (!toggleLeftPaneBtn || !toggleRightPaneBtn) return;
      toggleLeftPaneBtn.textContent = leftPaneCollapsed ? 'Show Left Pane' : 'Hide Left Pane';
      toggleRightPaneBtn.textContent = rightPaneCollapsed ? 'Show Right Pane' : 'Hide Right Pane';
      toggleLeftPaneBtn.setAttribute('aria-pressed', String(leftPaneCollapsed));
      toggleRightPaneBtn.setAttribute('aria-pressed', String(rightPaneCollapsed));
    }

    function applyPaneLayout(save = true) {
      if (!appContainer) return;
      // Never allow both lists to be hidden at the same time.
      if (leftPaneCollapsed && rightPaneCollapsed) {
        leftPaneCollapsed = false;
      }
      appContainer.classList.toggle('left-collapsed', leftPaneCollapsed);
      appContainer.classList.toggle('right-collapsed', rightPaneCollapsed);
      syncPaneButtons();
      if (save) {
        safeSetItem('pokemonLearnerPaneLayout', JSON.stringify({
          leftPaneCollapsed,
          rightPaneCollapsed
        }));
      }
    }

    function loadPaneLayout() {
      const saved = safeGetItem('pokemonLearnerPaneLayout');
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        leftPaneCollapsed = !!parsed.leftPaneCollapsed;
        rightPaneCollapsed = !!parsed.rightPaneCollapsed;
        if (leftPaneCollapsed && rightPaneCollapsed) {
          leftPaneCollapsed = false;
        }
      } catch (error) {
        console.warn('Invalid saved pane layout');
      }
    }

    function togglePane(side) {
      if (side === 'left') {
        leftPaneCollapsed = !leftPaneCollapsed;
      } else {
        rightPaneCollapsed = !rightPaneCollapsed;
      }
      applyPaneLayout();
      const activeElement = document.activeElement;
      if (activeElement !== leftSearch && activeElement !== rightSearch) {
        focusPrimarySearch();
      }
    }
    
    function loadLearnedPokemon() {
      const saved = safeGetItem('learnedPokemon');
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
          learnedPokemon = parsed;
        } else {
          learnedPokemon = {};
        }
      } catch (error) {
        console.warn('Invalid learnedPokemon storage value, resetting it.');
        learnedPokemon = {};
        safeSetItem('learnedPokemon', JSON.stringify(learnedPokemon));
      }
    }
    
    function saveLearnedPokemon() {
      safeSetItem('learnedPokemon', JSON.stringify(learnedPokemon));
    }

    function setTransferStatus(message, isError = false) {
      if (!transferStatus) return;
      transferStatus.textContent = message;
      transferStatus.classList.toggle('error', !!isError);
    }

    function normalizeImportedLearnedData(parsedData) {
      const source = parsedData?.learnedPokemon ?? parsedData;
      if (!source || typeof source !== 'object' || Array.isArray(source)) {
        throw new Error('Invalid file format');
      }

      const normalized = {};
      Object.entries(source).forEach(([numberKey, value]) => {
        const number = Number(numberKey);
        if (!Number.isInteger(number) || number < 1 || number > TOTAL_POKEMON) return;

        let learnedAt = null;
        if (typeof value === 'number' && Number.isFinite(value) && value > 0) {
          learnedAt = Math.floor(value);
        } else if (typeof value === 'string' && value.trim() !== '') {
          const parsed = Number(value);
          if (Number.isFinite(parsed) && parsed > 0) {
            learnedAt = Math.floor(parsed);
          }
        } else if (value === true) {
          learnedAt = Date.now();
        }

        if (learnedAt) {
          normalized[number] = learnedAt;
        }
      });

      if (Object.keys(normalized).length === 0) {
        throw new Error('No valid learned Pokemon found in file');
      }
      return normalized;
    }

    function exportLearnedPokemonData() {
      const payload = {
        app: 'pokemon-learner',
        version: 1,
        exportedAt: new Date().toISOString(),
        learnedPokemon
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const datePart = new Date().toISOString().slice(0, 10);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = `learned-pokemon-${datePart}.json`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      setTransferStatus(`Exported ${Object.keys(learnedPokemon).length} Pokemon`);
    }

    function importLearnedPokemonData(event) {
      const [file] = event.target.files || [];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          learnedPokemon = normalizeImportedLearnedData(parsed);
          saveLearnedPokemon();
          calculateStats();
          renderLeftList();
          renderRightList();
          if (selectedPokemon) {
            selectedFromRight = !!learnedPokemon[selectedPokemon.number];
            showPokemonDetails(selectedPokemon);
          }
          setTransferStatus(`Imported ${Object.keys(learnedPokemon).length} Pokemon`);
        } catch (error) {
          setTransferStatus(error.message || 'Import failed', true);
        } finally {
          importLearnedFile.value = '';
        }
      };
      reader.onerror = () => {
        setTransferStatus('Unable to read file', true);
        importLearnedFile.value = '';
      };
      reader.readAsText(file);
    }

    function promptSharedKeyword(label) {
      const raw = prompt(`${label}: enter a keyword`, '');
      if (raw == null) return '';
      const normalized = String(raw).trim().toLowerCase().replaceAll(/\s+/g, '-').replaceAll(/[^a-z0-9-_]/g, '');
      if (!normalized) {
        setTransferStatus('Keyword is required for shared transfer.', true);
      }
      return normalized;
    }

    async function exportLearnedPokemonShared() {
      const keyword = promptSharedKeyword('Shared export');
      if (!keyword) return;
      const key = window.AppSharedStore.buildSharedKey('pokemon-learner', keyword);
      const payload = {
        app: 'pokemon-learner',
        version: 1,
        exportedAt: new Date().toISOString(),
        learnedPokemon
      };
      try {
        await window.AppSharedStore.putSharedContent(key, payload);
        setTransferStatus(`Shared export complete (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared export failed', true);
      }
    }

    async function importLearnedPokemonShared() {
      const keyword = promptSharedKeyword('Shared import');
      if (!keyword) return;
      const key = window.AppSharedStore.buildSharedKey('pokemon-learner', keyword);
      try {
        learnedPokemon = normalizeImportedLearnedData(await window.AppSharedStore.getSharedContent(key));
        saveLearnedPokemon();
        calculateStats();
        renderLeftList();
        renderRightList();
        if (selectedPokemon) {
          selectedFromRight = !!learnedPokemon[selectedPokemon.number];
          showPokemonDetails(selectedPokemon);
        }
        setTransferStatus(`Shared import complete (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared import failed', true);
      }
    }

    async function clearLearnedPokemonShared() {
      const keyword = promptSharedKeyword('Clear shared');
      if (!keyword) return;
      const key = window.AppSharedStore.buildSharedKey('pokemon-learner', keyword);
      try {
        await window.AppSharedStore.deleteSharedContent(key);
        setTransferStatus(`Shared key cleared (${keyword})`, false);
      } catch (error) {
        setTransferStatus(error.message || 'Shared clear failed', true);
      }
    }
    
    function getRegion(number) {
      for (const region of REGIONS) {
        if (number >= region.start && number <= region.end) {
          return region.name;
        }
      }
      return 'Other';
    }

    function getPokemonImageUrl(number, variant = 'list') {
      if (imageTheme === IMAGE_THEMES.ANNIVERSARY) {
        return ANNIVERSARY_IMAGE_TEMPLATE.replace('{num}', String(number).padStart(4, '0'));
      }
      return variant === 'showcase' ? getPokemonArtworkUrl(number) : getPokemonSpriteUrl(number);
    }

    function syncImageThemeButton() {
      if (!toggleImageThemeBtn) return;
      toggleImageThemeBtn.textContent = `Icon Theme: ${imageTheme === IMAGE_THEMES.ANNIVERSARY ? '30th' : 'Normal'}`;
    }

    function applyImageTheme(save = true) {
      if (save) {
        safeSetItem(IMAGE_THEME_KEY, imageTheme);
      }
      syncImageThemeButton();
      renderLeftList();
      renderRightList();
      if (selectedPokemon) {
        showPokemonDetails(selectedPokemon);
      }
    }

    function toggleImageTheme() {
      imageTheme = imageTheme === IMAGE_THEMES.ANNIVERSARY ? IMAGE_THEMES.NORMAL : IMAGE_THEMES.ANNIVERSARY;
      applyImageTheme();
    }

    function matchesPokemonSearch(pokemon, query) {
      const normalizedQuery = query.trim().toLowerCase();
      if (!normalizedQuery) return true;
      const regionName = getRegion(pokemon.number).toLowerCase();
      return pokemon.name.includes(normalizedQuery) || regionName.includes(normalizedQuery);
    }
    
    function calculateStats() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      
      const learned = Object.keys(learnedPokemon).map(Number);
      
      const last24h = learned.filter(n => now - learnedPokemon[n] < day).length;
      const last7d = learned.filter(n => now - learnedPokemon[n] < 7 * day).length;
      const last30d = learned.filter(n => now - learnedPokemon[n] < 30 * day).length;
      const last365d = learned.filter(n => now - learnedPokemon[n] < 365 * day).length;
      
      const regionCounts = {};
      REGIONS.forEach(r => regionCounts[r.name] = 0);
      learned.forEach(n => {
        const region = getRegion(n);
        regionCounts[region] = (regionCounts[region] || 0) + 1;
      });
      
      statsBar.innerHTML = `
        <div class="stat-item highlight">
          <div class="stat-label">Learned</div>
          <div class="stat-number">${learned.length}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 24h</div>
          <div class="stat-number">${last24h}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 7d</div>
          <div class="stat-number">${last7d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 30d</div>
          <div class="stat-number">${last30d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 365d</div>
          <div class="stat-number">${last365d}</div>
        </div>
      `;
      
      regionStats.innerHTML = REGIONS.map(r => `
        <div class="region-stat">
          <span class="region-name">${r.name}</span>
          <span class="region-count">${regionCounts[r.name]}</span>
        </div>
      `).join('');
    }
    
    async function fetchAllPokemon() {
      try {
        const response = await fetch(`${POKEMON_API}/pokemon-species?limit=${TOTAL_POKEMON}`);
        if (!response.ok) throw new Error('Pokemon API request failed');
        const data = await response.json();
        allPokemon = data.results
          .map((p) => {
            const number = parseInt(p.url.split('/').filter(Boolean).pop(), 10);
            return {
            name: p.name,
            number,
            url: `${POKEMON_API}/pokemon/${number}`
          };
          })
          .filter(p => Number.isInteger(p.number) && p.number >= 1 && p.number <= TOTAL_POKEMON)
          .sort((a, b) => a.number - b.number);

        safeSetItem(POKEMON_CACHE_KEY, JSON.stringify(allPokemon));
        setTransferStatus(`Loaded ${allPokemon.length} Pokemon`);
        renderLeftList();
        renderRightList();
      } catch (error) {
        const cached = safeGetItem(POKEMON_CACHE_KEY);
        if (cached) {
          try {
            const parsed = JSON.parse(cached);
            if (Array.isArray(parsed) && parsed.length > 0) {
              allPokemon = parsed;
              setTransferStatus('Using cached Pokemon list (offline fallback).', true);
              renderLeftList();
              renderRightList();
              return;
            }
          } catch (parseError) {
            console.error(parseError);
          }
        }

        allPokemon = Array.from({ length: 1025 }, (_, idx) => {
          const number = idx + 1;
          return {
            name: `pokemon-${String(number).padStart(4, '0')}`,
            number,
            url: `${POKEMON_API}/pokemon/${number}`
          };
        });
        setTransferStatus('Using offline fallback list. Details may load slower until network recovers.', true);
        renderLeftList();
        renderRightList();
        console.error(error);
      }
    }
    
    async function fetchPokemonDetails(url) {
      const response = await fetch(url);
      return await response.json();
    }
    
    async function fetchPokemonSpecies(name) {
      const response = await fetch(`${POKEMON_API}/pokemon-species/${name}`);
      return await response.json();
    }
    
    function renderLeftList() {
      const query = leftSearch.value;
      const unlearned = allPokemon.filter(
        p => !learnedPokemon[p.number] && !failedPokemon.has(p.number) && matchesPokemonSearch(p, query)
      );
      
      leftList.innerHTML = unlearned.map((p, i) => `
        <div class="pokemon-item ${selectedPokemon?.number === p.number && !selectedFromRight ? 'selected' : ''} ${i === leftFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <img src="${getPokemonImageUrl(p.number)}" alt="${p.name}" onerror="this.src='${getPokemonSpriteUrl(p.number)}'">
          <div>
            <div class="name">${p.name}</div>
            <div class="number">#${String(p.number).padStart(3, '0')}</div>
          </div>
        </div>
      `).join('');
      
      leftList.querySelectorAll('.pokemon-item').forEach(item => {
        item.addEventListener('click', () => selectPokemon(parseInt(item.dataset.number), false));
      });
    }
    
    function renderRightList() {
      const query = rightSearch.value;
      const learned = allPokemon.filter(p => learnedPokemon[p.number] && matchesPokemonSearch(p, query));
      
      rightList.innerHTML = learned.map((p, i) => `
        <div class="pokemon-item ${selectedPokemon?.number === p.number && selectedFromRight ? 'selected' : ''} ${i === rightFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <img src="${getPokemonImageUrl(p.number)}" alt="${p.name}" onerror="this.src='${getPokemonSpriteUrl(p.number)}'">
          <div>
            <div class="name">${p.name}</div>
            <div class="number">#${String(p.number).padStart(3, '0')}</div>
          </div>
        </div>
      `).join('');
      
      rightList.querySelectorAll('.pokemon-item').forEach(item => {
        item.addEventListener('click', () => selectPokemon(parseInt(item.dataset.number), true));
      });
    }
    
    async function selectPokemon(number, fromRight) {
      selectedPokemon = allPokemon.find(p => p.number === number);
      selectedFromRight = fromRight;
      renderLeftList();
      renderRightList();
      await showPokemonDetails(selectedPokemon);
    }
    
    async function showPokemonDetails(pokemon) {
      centerContent.innerHTML = '<div class="loading">Loading...</div>';
      
      try {
        const [details, species] = await Promise.all([
          fetchPokemonDetails(pokemon.url),
          fetchPokemonSpecies(pokemon.name)
        ]);
        
        const flavorText = species.flavor_text_entries.find(f => f.language.name === 'en')?.flavor_text || '';
        const height = details.height / 10;
        const weight = details.weight / 10;
        const abilities = details.abilities.map(a => ({
          name: a.ability.name,
          isHidden: a.is_hidden
        }));
        const stats = details.stats.map(s => ({
          name: s.stat.name.replace('-', ' '),
          value: s.base_stat
        }));
        const types = details.types.map(t => t.type.name);
        const region = getRegion(pokemon.number);
        
        let evolutionHtml = '<div class="empty-state">No evolution data</div>';
        if (species.evolution_chain.url) {
          const evoResponse = await fetch(species.evolution_chain.url);
          const evoData = await evoResponse.json();
          evolutionHtml = renderEvolutionChain(evoData.chain);
        }
        
        centerContent.innerHTML = `
          <button class="select-btn ${selectedFromRight ? 'unselect' : ''}" id="selectBtn">
            ${selectedFromRight ? 'Unselect' : 'Select'}
          </button>
          
          <div class="showcase">
            <img class="showcase-image" src="${getPokemonImageUrl(pokemon.number, 'showcase')}" alt="${pokemon.name}" onerror="this.src='${getPokemonSpriteUrl(pokemon.number)}'">
            <div class="showcase-name">${pokemon.name}</div>
            <div class="showcase-region">Region: ${region}</div>
            <div class="showcase-types">
              ${types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('')}
            </div>
            <div class="height-weight">
              <div class="hw-item">
                <div class="hw-label">Height</div>
                <div class="hw-value">${height}m</div>
              </div>
              <div class="hw-item">
                <div class="hw-label">Weight</div>
                <div class="hw-value">${weight}kg</div>
              </div>
            </div>
          </div>
          
          <div class="stats-container">
            ${stats.slice(0, 6).map(s => `
              <div class="stat-box">
                <div class="stat-name">${s.name}</div>
                <div class="stat-value">${s.value}</div>
              </div>
            `).join('')}
          </div>
          
          <div class="abilities-section">
            <div class="section-title">Abilities</div>
            ${abilities.map(a => `<span class="ability-tag ${a.isHidden ? 'hidden' : ''}">${a.name}${a.isHidden ? ' (hidden)' : ''}</span>`).join('')}
          </div>
          
          <div class="description-section">
            <div class="section-title">About</div>
            <div class="flavor-text">${flavorText.replace(/\f/g, ' ')}</div>
          </div>
          
          <div class="evolution-section">
            <div class="section-title">Evolution</div>
            <div class="evolution-chain" id="evolutionChain">${evolutionHtml}</div>
          </div>
        `;
        
        document.getElementById('selectBtn').addEventListener('click', togglePokemon);
        
        document.querySelectorAll('.evolution-item').forEach(item => {
          item.addEventListener('click', () => {
            const num = parseInt(item.dataset.number);
            const evo = allPokemon.find(p => p.number === num);
            if (evo) selectPokemon(num, !!learnedPokemon[num]);
          });
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              const num = parseInt(item.dataset.number);
              const evo = allPokemon.find(p => p.number === num);
              if (evo) selectPokemon(num, !!learnedPokemon[num]);
            }
          });
        });
        
      } catch (error) {
        failedPokemon.add(pokemon.number);
        renderLeftList();
        centerContent.innerHTML = '<div class="empty-state">Error loading Pokemon details</div>';
        console.error(error);
      }
    }
    
    function renderEvolutionChain(chain, chainHtml = [], trigger = '') {
      const num = parseInt(chain.species.url.split('/').filter(Boolean).pop());
      
      chainHtml.push(`
        <div class="evolution-item" data-number="${num}" tabindex="0">
          <img src="${getPokemonImageUrl(num)}" alt="${chain.species.name}" onerror="this.src='${getPokemonSpriteUrl(num)}'">
          <div class="name">${chain.species.name}</div>
          ${trigger ? `<div class="evolution-trigger">${trigger}</div>` : ''}
        </div>
      `);
      
      if (chain.evolves_to.length > 0) {
        chain.evolves_to.forEach(evo => {
          const evolutionDetails = evo.evolution_details[0];
          let triggerText = '';
          if (evolutionDetails.min_level) triggerText = `Lv. ${evolutionDetails.min_level}`;
          if (evolutionDetails.item) triggerText = evolutionDetails.item.name;
          if (evolutionDetails.trigger?.name === 'trade') triggerText = 'Trade';
          
          renderEvolutionChain(evo, chainHtml, triggerText);
        });
      }
      
      return chainHtml.join('<span class="evolution-arrow">→</span>');
    }
    
    function togglePokemon() {
      if (!selectedPokemon) return;
      
      if (selectedFromRight) {
        delete learnedPokemon[selectedPokemon.number];
      } else {
        learnedPokemon[selectedPokemon.number] = Date.now();
      }
      
      saveLearnedPokemon();
      selectedFromRight = !selectedFromRight;
      calculateStats();
      renderLeftList();
      renderRightList();
      showPokemonDetails(selectedPokemon);
    }
    
    let tabFocus = 'leftSearch';
    
    leftSearch.addEventListener('input', renderLeftList);
    rightSearch.addEventListener('input', renderRightList);
    if (exportLearnedBtn) {
      exportLearnedBtn.addEventListener('click', exportLearnedPokemonData);
    }
    if (importLearnedBtn) {
      importLearnedBtn.addEventListener('click', () => {
        if (importLearnedFile) importLearnedFile.click();
      });
    }
    if (importLearnedFile) {
      importLearnedFile.addEventListener('change', importLearnedPokemonData);
    }
    if (exportSharedLearnedBtn) {
      exportSharedLearnedBtn.addEventListener('click', exportLearnedPokemonShared);
    }
    if (clearSharedLearnedBtn) {
      clearSharedLearnedBtn.addEventListener('click', clearLearnedPokemonShared);
    }
    if (importSharedLearnedBtn) {
      importSharedLearnedBtn.addEventListener('click', importLearnedPokemonShared);
    }
    if (toggleLeftPaneBtn) {
      toggleLeftPaneBtn.addEventListener('click', () => togglePane('left'));
    }
    if (toggleRightPaneBtn) {
      toggleRightPaneBtn.addEventListener('click', () => togglePane('right'));
    }
    if (toggleImageThemeBtn) {
      toggleImageThemeBtn.addEventListener('click', toggleImageTheme);
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        shortcutsOverlay.classList.toggle('visible');
        return;
      }
      
      if (shortcutsOverlay.classList.contains('visible')) {
        if (e.key === 'Escape') {
          shortcutsOverlay.classList.remove('visible');
        }
        return;
      }
      
      if (e.target === document.body || e.target === document.documentElement) {
        if (e.key === 'l' || e.key === 'L') {
          if (selectedPokemon) {
            togglePokemon();
          }
        } else if (e.key === '/') {
          e.preventDefault();
          focusPrimarySearch();
        } else if (e.key === 'Escape') {
          leftSearch.value = '';
          rightSearch.value = '';
          renderLeftList();
          renderRightList();
          focusPrimarySearch();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          leftSearch.value = '';
          leftSearch.blur();
          renderLeftList();
        }
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          rightSearch.value = '';
          rightSearch.blur();
          renderRightList();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftSearch') {
          tabFocus = 'leftList';
          leftFocusedIndex = 0;
          renderLeftList();
          const firstItem = leftList.querySelector('.pokemon-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPokemon(number, false);
          }
        } else if (tabFocus === 'rightList') {
          tabFocus = 'leftSearch';
          leftSearch.focus();
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftList') {
          if (rightPaneCollapsed) {
            tabFocus = 'leftSearch';
            leftSearch.focus();
          } else {
            tabFocus = 'rightSearch';
            rightSearch.focus();
          }
        } else if (tabFocus === 'rightSearch') {
          tabFocus = 'rightList';
          rightFocusedIndex = 0;
          renderRightList();
          const firstItem = rightList.querySelector('.pokemon-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPokemon(number, true);
          }
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    function handleListKeydown(isLeft) {
      return (e) => {
        const list = isLeft ? leftList : rightList;
        
        if (e.key === 'Tab') {
          e.preventDefault();
          if (isLeft && tabFocus === 'leftList') {
            if (rightPaneCollapsed) {
              tabFocus = 'leftSearch';
              leftSearch.focus();
            } else {
              tabFocus = 'rightSearch';
              rightSearch.focus();
            }
          } else if (!isLeft && tabFocus === 'rightList') {
            focusPrimarySearch();
          }
        } else if (e.key === ' ') {
          e.preventDefault();
          const btn = document.getElementById('selectBtn');
          if (btn) btn.click();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const items = list.querySelectorAll('.pokemon-item');
          if (isLeft) {
            leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
          } else {
            rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.pokemon-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPokemon(number, !isLeft);
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const items = list.querySelectorAll('.pokemon-item');
          if (isLeft) {
            leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
          } else {
            rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.pokemon-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPokemon(number, !isLeft);
          }
        }
      };
    }
    
    leftList.addEventListener('keydown', handleListKeydown(true));
    rightList.addEventListener('keydown', handleListKeydown(false));
    
    document.addEventListener('keydown', (e) => {
      if (shortcutsOverlay.classList.contains('visible')) return;
      
      if (e.target.tagName === 'INPUT') return;
      
      const isLeft = tabFocus === 'leftList';
      const list = isLeft ? leftList : rightList;
      const items = list.querySelectorAll('.pokemon-item');
      if (items.length === 0) return;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.pokemon-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPokemon(number, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.pokemon-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPokemon(number, !isLeft);
        }
      }
    });
    
    loadLearnedPokemon();
    loadPaneLayout();
    applyPaneLayout(false);
    applyImageTheme(false);
    calculateStats();
    fetchAllPokemon();
  </script>
  <script>window.APP_TELEMETRY_ID = "pokemon-learner";</script>
  <script src="app-telemetry.js" defer></script>
</body>
</html>
