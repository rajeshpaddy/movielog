<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
      overflow: hidden;
    }
    .app-container { 
      display: flex; 
      height: 100vh; 
      gap: 10px; 
      padding: 10px; 
    }
    .pane { 
      background: #16213e; 
      border-radius: 15px; 
      padding: 15px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 280px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 400px;
    }
    .pane-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #00d9ff;
      text-align: center;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 1px solid #00d9ff;
      color: #fff;
      padding: 10px 15px;
      border-radius: 25px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .search-box::placeholder { color: #666; }
    .search-box:focus { outline: none; box-shadow: 0 0 10px rgba(0, 217, 255, 0.3); }
    .pokemon-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .pokemon-item {
      background: #0f3460;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pokemon-item:hover { 
      background: #1a4a7a; 
      transform: translateX(3px);
    }
    .pokemon-item.selected {
      background: #00d9ff;
      color: #1a1a2e;
    }
    .pokemon-item.focused {
      outline: 2px solid #00d9ff;
      outline-offset: -2px;
    }
    .pokemon-item img {
      width: 40px;
      height: 40px;
    }
    .pokemon-item .name {
      font-weight: 500;
      text-transform: capitalize;
    }
    .pokemon-item .number {
      font-size: 12px;
      opacity: 0.7;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    .select-btn {
      background: #00d9ff;
      color: #1a1a2e;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.05); 
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
    }
    .select-btn.unselect {
      background: #ff6b6b;
    }
    .showcase {
      background: #0f3460;
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }
    .showcase-image {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .showcase-name {
      font-size: 28px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 15px 0;
    }
    .showcase-types {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .type-badge {
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      text-transform: capitalize;
    }
    .type-normal { background: #A8A77A; color: #1a1a2e; }
    .type-fire { background: #EE8130; color: #fff; }
    .type-water { background: #6390F0; color: #fff; }
    .type-electric { background: #F7D02C; color: #1a1a2e; }
    .type-grass { background: #7AC74C; color: #1a1a2e; }
    .type-ice { background: #96D9D6; color: #1a1a2e; }
    .type-fighting { background: #C22E28; color: #fff; }
    .type-poison { background: #A33EA1; color: #fff; }
    .type-ground { background: #E2BF65; color: #1a1a2e; }
    .type-flying { background: #A98FF3; color: #1a1a2e; }
    .type-psychic { background: #F95587; color: #fff; }
    .type-bug { background: #A6B91A; color: #1a1a2e; }
    .type-rock { background: #B6A136; color: #1a1a2e; }
    .type-ghost { background: #735797; color: #fff; }
    .type-dragon { background: #6F35FC; color: #fff; }
    .type-dark { background: #705746; color: #fff; }
    .type-steel { background: #B7B7CE; color: #1a1a2e; }
    .type-fairy { background: #D685AD; color: #1a1a2e; }
    
    .stats-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    .stat-box {
      background: #16213e;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-name {
      font-size: 12px;
      color: #888;
      text-transform: capitalize;
    }
    .stat-value {
      font-size: 20px;
      font-weight: bold;
      color: #00d9ff;
    }
    
    .abilities-section, .evolution-section, .description-section {
      background: #0f3460;
      border-radius: 15px;
      padding: 15px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      color: #00d9ff;
      margin-bottom: 10px;
    }
    .ability-tag {
      display: inline-block;
      background: #1a4a7a;
      padding: 5px 12px;
      border-radius: 15px;
      margin: 3px;
      font-size: 14px;
    }
    .ability-tag.hidden {
      background: #7a1a4a;
    }
    
    .evolution-chain {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .evolution-item {
      text-align: center;
      cursor: pointer;
    }
    .evolution-item:hover img {
      transform: scale(1.1);
    }
    .evolution-item:focus {
      outline: 2px solid #00d9ff;
      outline-offset: 4px;
      border-radius: 10px;
    }
    .evolution-item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      transition: transform 0.2s;
    }
    .evolution-item .name {
      font-size: 14px;
      text-transform: capitalize;
      margin-top: 5px;
    }
    .evolution-arrow {
      font-size: 24px;
      color: #888;
    }
    .evolution-trigger {
      font-size: 12px;
      color: #666;
    }
    
    .flavor-text {
      font-size: 14px;
      line-height: 1.6;
      color: #ccc;
    }
    
    .height-weight {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 15px;
    }
    .hw-item {
      text-align: center;
    }
    .hw-label {
      font-size: 12px;
      color: #888;
    }
    .hw-value {
      font-size: 18px;
      font-weight: bold;
      color: #00d9ff;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 18px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #666;
      font-size: 16px;
      text-align: center;
      padding: 20px;
    }
    
    .pokemon-list::-webkit-scrollbar {
      width: 8px;
    }
    .pokemon-list::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 4px;
    }
    .pokemon-list::-webkit-scrollbar-thumb {
      background: #00d9ff;
      border-radius: 4px;
    }

    .stats-bar {
      display: flex;
      gap: 15px;
      padding: 15px 20px;
      background: #16213e;
      border-radius: 15px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 10px 20px;
      border-radius: 10px;
      text-align: center;
      min-width: 120px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #00d9ff;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .region-stats {
      display: flex;
      gap: 10px;
      padding: 10px 20px;
      background: #16213e;
      border-radius: 15px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .region-stat {
      background: #0f3460;
      padding: 8px 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .region-stat .region-name {
      font-size: 12px;
      color: #aaa;
      text-transform: capitalize;
    }
    .region-stat .region-count {
      font-size: 16px;
      font-weight: bold;
      color: #00d9ff;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid #00d9ff;
      border-radius: 15px;
      padding: 20px 30px;
      max-width: 400px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #00d9ff;
      margin-bottom: 15px;
      font-size: 20px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 3px 10px;
      border-radius: 5px;
      font-family: monospace;
      color: #00d9ff;
    }
    .shortcut-desc {
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Learn/Unlearn Pokemon</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">View evolution</span><span class="shortcut-key">Enter</span></div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="region-stats" id="regionStats"></div>
  <div class="app-container">
    <div class="pane left-pane">
      <div class="pane-title">Unlearned Pokemon</div>
      <input type="text" class="search-box" id="leftSearch" placeholder="Search Pokemon...">
      <div class="pokemon-list" id="leftList"></div>
    </div>
    
    <div class="pane center-pane">
      <div class="center-content" id="centerContent">
        <div class="empty-state">Click a Pokemon to learn about it!</div>
      </div>
    </div>
    
    <div class="pane right-pane">
      <div class="pane-title">Learned Pokemon</div>
      <input type="text" class="search-box" id="rightSearch" placeholder="Search learned...">
      <div class="pokemon-list" id="rightList"></div>
    </div>
  </div>

  <script>
    const POKEMON_API = 'https://pokeapi.co/api/v2';
    const TOTAL_POKEMON = 1300;
    
    const REGIONS = [
      { name: 'Kanto', start: 1, end: 151 },
      { name: 'Johto', start: 152, end: 251 },
      { name: 'Hoenn', start: 252, end: 386 },
      { name: 'Sinnoh', start: 387, end: 493 },
      { name: 'Unova', start: 494, end: 649 },
      { name: 'Kalos', start: 650, end: 721 },
      { name: 'Alola', start: 722, end: 809 },
      { name: 'Galar', start: 810, end: 905 },
      { name: 'Paldea', start: 906, end: 1025 }
    ];
    
    let allPokemon = [];
    let learnedPokemon = {};
    let failedPokemon = new Set();
    let selectedPokemon = null;
    let selectedFromRight = false;
    let leftFocusedIndex = -1;
    let rightFocusedIndex = -1;
    
    const leftSearch = document.getElementById('leftSearch');
    const rightSearch = document.getElementById('rightSearch');
    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const centerContent = document.getElementById('centerContent');
    const statsBar = document.getElementById('statsBar');
    const regionStats = document.getElementById('regionStats');
    const shortcutsOverlay = document.getElementById('shortcutsOverlay');
    
    function loadLearnedPokemon() {
      const saved = localStorage.getItem('learnedPokemon');
      if (saved) {
        learnedPokemon = JSON.parse(saved);
      }
    }
    
    function saveLearnedPokemon() {
      localStorage.setItem('learnedPokemon', JSON.stringify(learnedPokemon));
    }
    
    function getRegion(number) {
      for (const region of REGIONS) {
        if (number >= region.start && number <= region.end) {
          return region.name;
        }
      }
      return 'Other';
    }
    
    function calculateStats() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      
      const learned = Object.keys(learnedPokemon).map(Number);
      const unlearned = TOTAL_POKEMON - learned.length;
      
      const last24h = learned.filter(n => now - learnedPokemon[n] < day).length;
      const last7d = learned.filter(n => now - learnedPokemon[n] < 7 * day).length;
      const last30d = learned.filter(n => now - learnedPokemon[n] < 30 * day).length;
      const last365d = learned.filter(n => now - learnedPokemon[n] < 365 * day).length;
      
      const regionCounts = {};
      REGIONS.forEach(r => regionCounts[r.name] = 0);
      learned.forEach(n => {
        const region = getRegion(n);
        regionCounts[region] = (regionCounts[region] || 0) + 1;
      });
      
      statsBar.innerHTML = `
        <div class="stat-item">
          <div class="stat-label">Unlearned</div>
          <div class="stat-number">${unlearned}</div>
        </div>
        <div class="stat-item highlight">
          <div class="stat-label">Learned</div>
          <div class="stat-number">${learned.length}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 24h</div>
          <div class="stat-number">${last24h}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 7d</div>
          <div class="stat-number">${last7d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 30d</div>
          <div class="stat-number">${last30d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 365d</div>
          <div class="stat-number">${last365d}</div>
        </div>
      `;
      
      regionStats.innerHTML = REGIONS.map(r => `
        <div class="region-stat">
          <span class="region-name">${r.name}</span>
          <span class="region-count">${regionCounts[r.name]}</span>
        </div>
      `).join('');
    }
    
    async function fetchAllPokemon() {
      const response = await fetch(`${POKEMON_API}/pokemon?limit=${TOTAL_POKEMON}`);
      const data = await response.json();
      allPokemon = data.results.map((p, i) => ({
        name: p.name,
        number: i + 1,
        url: p.url
      }));
      renderLeftList();
      renderRightList();
    }
    
    async function fetchPokemonDetails(url) {
      const response = await fetch(url);
      return await response.json();
    }
    
    async function fetchPokemonSpecies(name) {
      const response = await fetch(`${POKEMON_API}/pokemon-species/${name}`);
      return await response.json();
    }
    
    function renderLeftList() {
      const query = leftSearch.value.toLowerCase();
      const unlearned = allPokemon.filter(p => !learnedPokemon[p.number] && !failedPokemon.has(p.number) && p.name.includes(query));
      
      leftList.innerHTML = unlearned.map((p, i) => `
        <div class="pokemon-item ${selectedPokemon?.number === p.number && !selectedFromRight ? 'selected' : ''} ${i === leftFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.number}.png" alt="${p.name}">
          <div>
            <div class="name">${p.name}</div>
            <div class="number">#${String(p.number).padStart(3, '0')}</div>
          </div>
        </div>
      `).join('');
      
      leftList.querySelectorAll('.pokemon-item').forEach(item => {
        item.addEventListener('click', () => selectPokemon(parseInt(item.dataset.number), false));
      });
    }
    
    function renderRightList() {
      const query = rightSearch.value.toLowerCase();
      const learned = allPokemon.filter(p => learnedPokemon[p.number] && p.name.includes(query));
      
      rightList.innerHTML = learned.map((p, i) => `
        <div class="pokemon-item ${selectedPokemon?.number === p.number && selectedFromRight ? 'selected' : ''} ${i === rightFocusedIndex ? 'focused' : ''}" data-number="${p.number}" data-index="${i}" tabindex="0">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.number}.png" alt="${p.name}">
          <div>
            <div class="name">${p.name}</div>
            <div class="number">#${String(p.number).padStart(3, '0')}</div>
          </div>
        </div>
      `).join('');
      
      rightList.querySelectorAll('.pokemon-item').forEach(item => {
        item.addEventListener('click', () => selectPokemon(parseInt(item.dataset.number), true));
      });
    }
    
    async function selectPokemon(number, fromRight) {
      selectedPokemon = allPokemon.find(p => p.number === number);
      selectedFromRight = fromRight;
      renderLeftList();
      renderRightList();
      await showPokemonDetails(selectedPokemon);
    }
    
    async function showPokemonDetails(pokemon) {
      centerContent.innerHTML = '<div class="loading">Loading...</div>';
      
      try {
        const [details, species] = await Promise.all([
          fetchPokemonDetails(pokemon.url),
          fetchPokemonSpecies(pokemon.name)
        ]);
        
        const flavorText = species.flavor_text_entries.find(f => f.language.name === 'en')?.flavor_text || '';
        const height = details.height / 10;
        const weight = details.weight / 10;
        const abilities = details.abilities.map(a => ({
          name: a.ability.name,
          isHidden: a.is_hidden
        }));
        const stats = details.stats.map(s => ({
          name: s.stat.name.replace('-', ' '),
          value: s.base_stat
        }));
        const types = details.types.map(t => t.type.name);
        
        let evolutionHtml = '<div class="empty-state">No evolution data</div>';
        if (species.evolution_chain.url) {
          const evoResponse = await fetch(species.evolution_chain.url);
          const evoData = await evoResponse.json();
          evolutionHtml = renderEvolutionChain(evoData.chain);
        }
        
        centerContent.innerHTML = `
          <button class="select-btn ${selectedFromRight ? 'unselect' : ''}" id="selectBtn">
            ${selectedFromRight ? 'Unselect' : 'Select'}
          </button>
          
          <div class="showcase">
            <img class="showcase-image" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${pokemon.number}.png" alt="${pokemon.name}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.number}.png'">
            <div class="showcase-name">${pokemon.name}</div>
            <div class="showcase-types">
              ${types.map(t => `<span class="type-badge type-${t}">${t}</span>`).join('')}
            </div>
            <div class="height-weight">
              <div class="hw-item">
                <div class="hw-label">Height</div>
                <div class="hw-value">${height}m</div>
              </div>
              <div class="hw-item">
                <div class="hw-label">Weight</div>
                <div class="hw-value">${weight}kg</div>
              </div>
            </div>
          </div>
          
          <div class="stats-container">
            ${stats.slice(0, 6).map(s => `
              <div class="stat-box">
                <div class="stat-name">${s.name}</div>
                <div class="stat-value">${s.value}</div>
              </div>
            `).join('')}
          </div>
          
          <div class="abilities-section">
            <div class="section-title">Abilities</div>
            ${abilities.map(a => `<span class="ability-tag ${a.isHidden ? 'hidden' : ''}">${a.name}${a.isHidden ? ' (hidden)' : ''}</span>`).join('')}
          </div>
          
          <div class="description-section">
            <div class="section-title">About</div>
            <div class="flavor-text">${flavorText.replace(/\f/g, ' ')}</div>
          </div>
          
          <div class="evolution-section">
            <div class="section-title">Evolution</div>
            <div class="evolution-chain" id="evolutionChain">${evolutionHtml}</div>
          </div>
        `;
        
        document.getElementById('selectBtn').addEventListener('click', togglePokemon);
        
        document.querySelectorAll('.evolution-item').forEach(item => {
          item.addEventListener('click', () => {
            const num = parseInt(item.dataset.number);
            const evo = allPokemon.find(p => p.number === num);
            if (evo) selectPokemon(num, !!learnedPokemon[num]);
          });
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
              const num = parseInt(item.dataset.number);
              const evo = allPokemon.find(p => p.number === num);
              if (evo) selectPokemon(num, !!learnedPokemon[num]);
            }
          });
        });
        
      } catch (error) {
        failedPokemon.add(pokemon.number);
        renderLeftList();
        centerContent.innerHTML = '<div class="empty-state">Error loading Pokemon details</div>';
        console.error(error);
      }
    }
    
    function renderEvolutionChain(chain, chainHtml = [], trigger = '') {
      const num = parseInt(chain.species.url.split('/').filter(Boolean).pop());
      
      chainHtml.push(`
        <div class="evolution-item" data-number="${num}" tabindex="0">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${num}.png" alt="${chain.species.name}">
          <div class="name">${chain.species.name}</div>
          ${trigger ? `<div class="evolution-trigger">${trigger}</div>` : ''}
        </div>
      `);
      
      if (chain.evolves_to.length > 0) {
        chain.evolves_to.forEach(evo => {
          const evolutionDetails = evo.evolution_details[0];
          let triggerText = '';
          if (evolutionDetails.min_level) triggerText = `Lv. ${evolutionDetails.min_level}`;
          if (evolutionDetails.item) triggerText = evolutionDetails.item.name;
          if (evolutionDetails.trigger?.name === 'trade') triggerText = 'Trade';
          
          renderEvolutionChain(evo, chainHtml, triggerText);
        });
      }
      
      return chainHtml.join('<span class="evolution-arrow">→</span>');
    }
    
    function togglePokemon() {
      if (!selectedPokemon) return;
      
      if (selectedFromRight) {
        delete learnedPokemon[selectedPokemon.number];
      } else {
        learnedPokemon[selectedPokemon.number] = Date.now();
      }
      
      saveLearnedPokemon();
      selectedFromRight = !selectedFromRight;
      calculateStats();
      renderLeftList();
      renderRightList();
      showPokemonDetails(selectedPokemon);
    }
    
    let tabFocus = 'leftSearch';
    
    leftSearch.addEventListener('input', renderLeftList);
    rightSearch.addEventListener('input', renderRightList);
    
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        shortcutsOverlay.classList.toggle('visible');
        return;
      }
      
      if (shortcutsOverlay.classList.contains('visible')) {
        if (e.key === 'Escape') {
          shortcutsOverlay.classList.remove('visible');
        }
        return;
      }
      
      if (e.target === document.body || e.target === document.documentElement) {
        if (e.key === 'l' || e.key === 'L') {
          if (selectedPokemon) {
            togglePokemon();
          }
        } else if (e.key === '/') {
          e.preventDefault();
          leftSearch.focus();
        } else if (e.key === 'Escape') {
          leftSearch.value = '';
          rightSearch.value = '';
          renderLeftList();
          renderRightList();
          leftSearch.focus();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          leftSearch.value = '';
          leftSearch.blur();
          renderLeftList();
        }
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          rightSearch.value = '';
          rightSearch.blur();
          renderRightList();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftSearch') {
          tabFocus = 'leftList';
          leftFocusedIndex = 0;
          renderLeftList();
          const firstItem = leftList.querySelector('.pokemon-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPokemon(number, false);
          }
        } else if (tabFocus === 'rightList') {
          tabFocus = 'leftSearch';
          leftSearch.focus();
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftList') {
          tabFocus = 'rightSearch';
          rightSearch.focus();
        } else if (tabFocus === 'rightSearch') {
          tabFocus = 'rightList';
          rightFocusedIndex = 0;
          renderRightList();
          const firstItem = rightList.querySelector('.pokemon-item');
          if (firstItem) {
            const number = parseInt(firstItem.dataset.number);
            selectPokemon(number, true);
          }
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    function handleListKeydown(isLeft) {
      return (e) => {
        const list = isLeft ? leftList : rightList;
        
        if (e.key === 'Tab') {
          e.preventDefault();
          if (isLeft && tabFocus === 'leftList') {
            tabFocus = 'rightSearch';
            rightSearch.focus();
          } else if (!isLeft && tabFocus === 'rightList') {
            tabFocus = 'leftSearch';
            leftSearch.focus();
          }
        } else if (e.key === ' ') {
          e.preventDefault();
          const btn = document.getElementById('selectBtn');
          if (btn) btn.click();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const items = list.querySelectorAll('.pokemon-item');
          if (isLeft) {
            leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
          } else {
            rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.pokemon-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPokemon(number, !isLeft);
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const items = list.querySelectorAll('.pokemon-item');
          if (isLeft) {
            leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
          } else {
            rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.pokemon-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const number = parseInt(focused.dataset.number);
            selectPokemon(number, !isLeft);
          }
        }
      };
    }
    
    leftList.addEventListener('keydown', handleListKeydown(true));
    rightList.addEventListener('keydown', handleListKeydown(false));
    
    document.addEventListener('keydown', (e) => {
      if (shortcutsOverlay.classList.contains('visible')) return;
      
      if (e.target.tagName === 'INPUT') return;
      
      const isLeft = tabFocus === 'leftList';
      const list = isLeft ? leftList : rightList;
      const items = list.querySelectorAll('.pokemon-item');
      if (items.length === 0) return;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.pokemon-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPokemon(number, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.pokemon-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const number = parseInt(focused.dataset.number);
          selectPokemon(number, !isLeft);
        }
      }
    });
    
    loadLearnedPokemon();
    calculateStats();
    fetchAllPokemon();
  </script>
</body>
</html>
