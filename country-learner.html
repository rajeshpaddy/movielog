
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
      overflow-x: hidden;
    }
    .app-container { 
      display: flex; 
      height: 100vh; 
      gap: 12px; 
      padding: 12px; 
    }
    .pane { 
      background: #16213e; 
      border-radius: 20px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 320px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 350px;
    }
    .pane-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #10b981;
      text-align: center;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 2px solid #10b981;
      color: #fff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: #888; }
    .search-box:focus { outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    .country-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .country-item {
      background: #0f3460;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .country-item:hover { 
      background: #1a4a7a; 
      transform: translateX(5px);
    }
    .country-item.selected {
      background: #10b981;
      color: #1a1a2e;
    }
    .country-item.focused {
      outline: 3px solid #10b981;
      outline-offset: -3px;
    }
    .country-item .flag {
      font-size: 28px;
    }
    .country-item .name {
      font-weight: 600;
      font-size: 16px;
      text-transform: capitalize;
    }
    .country-item .continent {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .select-btn {
      background: #10b981;
      color: #1a1a2e;
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
    }
    .select-btn.unselect {
      background: #ef4444;
    }
    .showcase {
      background: #0f3460;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }
    .showcase-flag {
      font-size: 80px;
      margin-bottom: 10px;
    }
    .showcase-name {
      font-size: 36px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 10px 0;
    }
    .showcase-native {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .showcase-region {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .region-asia { background: #ef4444; color: #fff; }
    .region-europe { background: #3b82f6; color: #fff; }
    .region-africa { background: #f59e0b; color: #fff; }
    .region-north-america { background: #10b981; color: #fff; }
    .region-south-america { background: #8b5cf6; color: #fff; }
    .region-oceania { background: #06b6d4; color: #fff; }
    
    .map-container {
      position: relative;
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    .map-image {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 12px;
    }
    .travel-advisory {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .advisory-badge {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }
    .advisory-level-1 { background: #10b981; color: #fff; }
    .advisory-level-2 { background: #f59e0b; color: #1a1a2e; }
    .advisory-level-3 { background: #f97316; color: #fff; }
    .advisory-level-4 { background: #ef4444; color: #fff; }
    .advisory-unknown { background: #6b7280; color: #fff; }
    .advisory-text {
      flex: 1;
    }
    .advisory-title {
      font-size: 16px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 8px;
    }
    .advisory-description {
      font-size: 15px;
      color: #ddd;
      line-height: 1.5;
    }
    
    .info-section {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
      margin-bottom: 10px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a4a7a;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      color: #888;
      font-size: 15px;
    }
    .info-value {
      color: #eee;
      font-size: 15px;
      font-weight: 500;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 22px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 20px;
      text-align: center;
      padding: 30px;
    }
    
    .country-list::-webkit-scrollbar {
      width: 10px;
    }
    .country-list::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 5px;
    }
    .country-list::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 5px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    .mini-map {
      width: 320px;
      height: 160px;
      background: #0f3460;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .mini-map-grid {
      width: 100%;
      height: 100%;
      opacity: 0.5;
    }
    .mini-map-grid svg {
      width: 100%;
      height: 100%;
    }
    .mini-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ef4444;
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #ef4444;
      z-index: 10;
    }
    .stats-section {
      flex: 1;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #16213e;
      border-radius: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      min-width: 100px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .continent-legend {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .continent-stat {
      background: #0f3460;
      padding: 10px 18px;
      border-radius: 12px;
      display: flex;
      align-items: center; gap: 10px;
    }
    .continent-stat .continent-name {
      font-size: 14px;
      color: #bbb;
      text-transform: capitalize;
    }
    .continent-stat .continent-count {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
    }
    .continent-stat .continent-total {
      font-size: 12px;
      color: #666;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #10b981;
      border-radius: 20px;
      padding: 24px 36px;
      max-width: 450px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #10b981;
      margin-bottom: 18px;
      font-size: 26px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: monospace;
      color: #10b981;
      font-size: 18px;
    }
    .shortcut-desc {
      color: #bbb;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 10px;
      }
      .pane {
        width: 100% !important;
        min-width: unset !important;
        max-height: 45vh;
      }
      .left-pane { order: 1; }
      .center-pane { order: 2; }
      .right-pane { order: 3; }
      .stats-bar {
        gap: 8px;
        padding: 12px;
      }
      .continent-legend {
        gap: 6px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Visit/Unvisit Country</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
    </div>
  </div>
  <div class="top-bar">
    <div class="mini-map" id="miniMap">
      <div class="mini-map-grid"></div>
      <div class="mini-dot" id="miniDot" style="display:none;"></div>
    </div>
    <div class="stats-section">
      <div class="stats-bar" id="statsBar"></div>
      <div class="continent-legend" id="continentLegend"></div>
    </div>
  </div>
  <div class="app-container">
    <div class="pane left-pane">
      <div class="pane-title">All Countries</div>
      <input type="text" class="search-box" id="leftSearch" placeholder="Search countries...">
      <div class="country-list" id="leftList"></div>
    </div>
    
    <div class="pane center-pane">
      <div class="center-content" id="centerContent">
        <div class="empty-state">Click a country to learn about it!</div>
      </div>
    </div>
    
    <div class="pane right-pane">
      <div class="pane-title">Visited Countries</div>
      <input type="text" class="search-box" id="rightSearch" placeholder="Search visited...">
      <div class="country-list" id="rightList"></div>
    </div>
  </div>

    let visitedCountries = JSON.parse(localStorage.getItem('visitedCountries')) || {};
    let selectedCountryCode = null;
    let leftSearchTerm = "";
    let rightSearchTerm = "";
    let leftFocusedIndex = -1;
    let rightFocusedIndex = -1;

    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const leftSearch = document.getElementById('leftSearch');
    const rightSearch = document.getElementById('rightSearch');
    const centerContent = document.getElementById('centerContent');
    const statsBar = document.getElementById('statsBar');
    const continentLegend = document.getElementById('continentLegend');
    const miniDot = document.getElementById('miniDot');
    const miniMap = document.getElementById('miniMap');
    const shortcutsOverlay = document.getElementById('shortcutsOverlay');

    function saveVisitedCountries() {
      localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
    }

    function calculateStats() {
      const total = COUNTRIES.length;
      const visitedCount = Object.keys(visitedCountries).length;
      const percent = total > 0 ? Math.round((visitedCount / total) * 100) : 0;
      
      statsBar.innerHTML = `
        <div class="stat-item">
          <div class="stat-label">Explored</div>
          <div class="stat-number">${visitedCount}</div>
        </div>
        <div class="stat-item highlight">
          <div class="stat-label">Progress</div>
          <div class="stat-number">${percent}%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Total</div>
          <div class="stat-number">${total}</div>
        </div>
      `;
    }

    function calculateContinentStats() {
      const stats = {};
      COUNTRIES.forEach(c => {
        if (!stats[c.continent]) stats[c.continent] = { visited: 0, total: 0 };
        stats[c.continent].total++;
        if (visitedCountries[c.code]) stats[c.continent].visited++;
      });

      continentLegend.innerHTML = Object.entries(stats).map(([name, data]) => `
        <div class="continent-stat">
          <span class="continent-name">${name.replace('-', ' ')}</span>
          <span class="continent-count">${data.visited}</span>
          <span class="continent-total">/ ${data.total}</span>
        </div>
      `).join('');
    }

    function renderLeftList() {
      const filtered = COUNTRIES.filter(c => 
        c.name.toLowerCase().includes(leftSearchTerm.toLowerCase()) ||
        c.code.toLowerCase().includes(leftSearchTerm.toLowerCase())
      );

      leftList.innerHTML = filtered.map((c, index) => `
        <div class="country-item ${c.code === selectedCountryCode ? 'selected' : ''} ${index === leftFocusedIndex ? 'focused' : ''}" 
             onclick="selectCountry('${c.code}', false)" data-code="${c.code}">
          <span class="flag">${c.flag}</span>
          <div class="details">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent.replace('-', ' ')}</div>
          </div>
        </div>
      `).join('');
    }

    function renderRightList() {
      const visitedArray = COUNTRIES.filter(c => visitedCountries[c.code]);
      const filtered = visitedArray.filter(c => 
        c.name.toLowerCase().includes(rightSearchTerm.toLowerCase())
      );

      if (filtered.length === 0) {
        rightList.innerHTML = '<div class="empty-state">No visited countries found</div>';
        return;
      }

      rightList.innerHTML = filtered.map((c, index) => `
        <div class="country-item ${c.code === selectedCountryCode ? 'selected' : ''} ${index === rightFocusedIndex ? 'focused' : ''}" 
             onclick="selectCountry('${c.code}', true)" data-code="${c.code}">
          <span class="flag">${c.flag}</span>
          <div class="details">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent.replace('-', ' ')}</div>
          </div>
        </div>
      `).join('');
    }

    function selectCountry(code, fromRight = false) {
      selectedCountryCode = code;
      localStorage.setItem('lastSelectedCountry', code);
      const country = COUNTRIES.find(c => c.code === code);
      
      if (fromRight) {
        rightFocusedIndex = Array.from(rightList.querySelectorAll('.country-item')).findIndex(el => el.dataset.code === code);
        leftFocusedIndex = -1;
      } else {
        leftFocusedIndex = Array.from(leftList.querySelectorAll('.country-item')).findIndex(el => el.dataset.code === code);
        rightFocusedIndex = -1;
      }

      renderLeftList();
      renderRightList();
      renderCenter(country);
      updateMiniMap(country);
    }

    function toggleVisited(code) {
      if (visitedCountries[code]) {
        delete visitedCountries[code];
      } else {
        visitedCountries[code] = true;
      }
      saveVisitedCountries();
      calculateStats();
      calculateContinentStats();
      renderLeftList();
      renderRightList();
      
      const country = COUNTRIES.find(c => c.code === code);
      renderCenter(country);
    }

    function updateMiniMap(country) {
      if (!country.lat || !country.lng) {
        miniDot.style.display = 'none';
        return;
      }
      
      const x = (country.lng + 180) * (miniMap.offsetWidth / 360);
      const latRad = country.lat * Math.PI / 180;
      const mercN = Math.log(Math.tan((Math.PI / 4) + (latRad / 2)));
      const y = (miniMap.offsetHeight / 2) - (miniMap.offsetWidth * mercN / (2 * Math.PI));
      
      miniDot.style.display = 'block';
      miniDot.style.left = x + 'px';
      miniDot.style.top = y + 'px';
    }

    function renderCenter(country) {
      if (!country) {
        centerContent.innerHTML = '<div class="empty-state">Country details will appear here</div>';
        return;
      }

      const isVisited = !!visitedCountries[country.code];
      
      centerContent.innerHTML = `
        <div class="showcase">
          <div class="showcase-flag">${country.flag}</div>
          <div class="showcase-name">${country.name}</div>
          <div class="showcase-native">${country.nativeName}</div>
          <div class="showcase-region region-${country.continent}">${country.continent.replace('-', ' ')}</div>
        </div>

        <button class="select-btn ${isVisited ? 'unselect' : ''}" onclick="toggleVisited('${country.code}')">
          ${isVisited ? 'MARK AS UNVISITED' : 'MARK AS VISITED'}
        </button>

        <div class="travel-advisory">
          <div class="advisory-badge advisory-level-${country.travelAdvisory || 'unknown'}">
            LEVEL ${country.travelAdvisory || '?'}
          </div>
          <div class="advisory-text">
            <div class="advisory-title">Travel Advisory</div>
            <div class="advisory-description">${country.travelNote || 'No specific travel information available.'}</div>
          </div>
        </div>

        <div class="info-section">
          <div class="section-title">Key Information</div>
          <div class="info-row">
            <span class="info-label">Capital</span>
            <span class="info-value">${country.capital}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Population</span>
            <span class="info-value">${country.population?.toLocaleString()}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Currency</span>
            <span class="info-value">${country.currency}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Languages</span>
            <span class="info-value">${country.language}</span>
          </div>
        </div>
      `;
    }

    leftSearch.addEventListener('input', (e) => {
      leftSearchTerm = e.target.value;
      leftFocusedIndex = -1;
      renderLeftList();
    });

    rightSearch.addEventListener('input', (e) => {
      rightSearchTerm = e.target.value;
      rightFocusedIndex = -1;
      renderRightList();
    });

    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        shortcutsOverlay.classList.toggle('visible');
        return;
      }

      if (e.key === 'Escape') {
        shortcutsOverlay.classList.remove('visible');
        leftSearch.value = "";
        rightSearch.value = "";
        leftSearchTerm = "";
        rightSearchTerm = "";
        renderLeftList();
        renderRightList();
        leftSearch.blur();
        rightSearch.blur();
        return;
      }

      if (document.activeElement.tagName === 'INPUT') return;

      if (e.key === '/') {
        e.preventDefault();
        leftSearch.focus();
      }

      if (e.key === ' ' && selectedCountryCode) {
        e.preventDefault();
        toggleVisited(selectedCountryCode);
      }

      if (e.key.toLowerCase() === 'l' && selectedCountryCode) {
        toggleVisited(selectedCountryCode);
      }

      const isLeft = leftFocusedIndex !== -1 || (!rightSearch.matches(':focus') && rightFocusedIndex === -1);
      const list = isLeft ? leftList : rightList;
      const items = Array.from(list.querySelectorAll('.country-item'));
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      }
    });

    // Fix: Wait for DOM before initializing
    document.addEventListener('DOMContentLoaded', () => {
      calculateStats();
      calculateContinentStats();
      renderLeftList();
      renderRightList();
      
      const lastSelected = localStorage.getItem('lastSelectedCountry');
      if (lastSelected) {
        const fromRight = !!visitedCountries[lastSelected];
        selectCountry(lastSelected, fromRight);
      }
    });
  </script>
</body>
</html>
