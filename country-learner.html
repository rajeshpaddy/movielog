
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
    }
    .app-container {
      display: flex;
      height: 100vh;
      height: 100dvh;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }
    .pane { 
      background: #16213e; 
      border-radius: 20px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 320px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 350px;
    }
    .pane-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #10b981;
      text-align: center;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 2px solid #10b981;
      color: #fff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: #888; }
    .search-box:focus { outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    .continent-select {
      width: 100%;
      background: #0f3460;
      border: 2px solid #10b981;
      color: #fff;
      padding: 12px 14px;
      border-radius: 14px;
      font-size: 15px;
      margin-bottom: 12px;
    }
    .continent-select:focus { outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    .filter-radios {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .filter-radio {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #0f3460;
      border: 2px solid #1a4a7a;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      color: #ddd;
      cursor: pointer;
      user-select: none;
    }
    .filter-radio input {
      accent-color: #10b981;
      cursor: pointer;
    }
    .country-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .country-item {
      background: #0f3460;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .country-item:hover { 
      background: #1a4a7a; 
      transform: translateX(5px);
    }
    .country-item.selected {
      background: #10b981;
      color: #1a1a2e;
    }
    .country-item.focused {
      outline: 3px solid #10b981;
      outline-offset: -3px;
    }
    .country-item .flag {
      font-size: 28px;
    }
    .country-item .name {
      font-weight: 600;
      font-size: 16px;
      text-transform: capitalize;
    }
    .country-item .continent {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
    }
    .select-btn {
      background: #10b981;
      color: #1a1a2e;
      border: none;
      padding: 10px 22px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
    }
    .select-btn.unselect {
      background: #ef4444;
    }
    .showcase {
      background: linear-gradient(145deg, #10345d 0%, #0d2849 100%);
      border: 1px solid #1e4f82;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .showcase-top {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      column-gap: 10px;
      align-items: center;
    }
    .showcase-flag-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
    .showcase-flag {
      font-size: 56px;
      line-height: 1;
      margin: 0;
      align-self: start;
      justify-self: start;
      background: #122b4f;
      border: 2px solid #1a4a7a;
      border-radius: 12px;
      width: 78px;
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .showcase-main {
      width: 100%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 4px;
      align-self: center;
      padding-top: 0;
    }
    .showcase-header {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-start;
    }
    .showcase-title-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      flex-wrap: wrap;
    }
    .showcase-name {
      font-size: 34px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 0;
      line-height: 1;
    }
    .showcase-native {
      font-size: 12px;
      color: #bdd4ee;
      margin-top: 0;
      text-align: center;
      width: 78px;
    }
    .showcase-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }
    .showcase-region {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin: 0;
      text-transform: capitalize;
    }
    .showcase .advisory-badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
    }
    .showcase-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .meta-item {
      background: #122b4f;
      border-radius: 8px;
      padding: 6px 8px;
      border: 1px solid #1a4a7a;
    }
    .meta-label {
      display: block;
      color: #8fb4d9;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 1px;
    }
    .meta-value {
      color: #eef5ff;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.15;
      word-break: break-word;
    }
    @media (max-width: 1300px) {
      .showcase-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (min-width: 1600px) {
      .showcase {
        border-radius: 22px;
        padding: 20px;
      }
      .showcase-top {
        grid-template-columns: 104px minmax(0, 1fr);
      }
      .showcase-name {
        font-size: 36px;
      }
      .meta-value {
        font-size: 14px;
      }
    }
    .region-asia { background: #ef4444; color: #fff; }
    .region-europe { background: #3b82f6; color: #fff; }
    .region-africa { background: #f59e0b; color: #fff; }
    .region-north-america { background: #10b981; color: #fff; }
    .region-south-america { background: #8b5cf6; color: #fff; }
    .region-oceania { background: #06b6d4; color: #fff; }
    
    .map-container {
      position: relative;
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    .map-image {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 12px;
    }
    .travel-advisory {
      background: #0f3460;
      border-radius: 20px;
      padding: 18px 20px;
      border-left: 4px solid #fbbf24;
    }
    .advisory-badge {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }
    .advisory-level-1 { background: #10b981; color: #fff; }
    .advisory-level-2 { background: #f59e0b; color: #1a1a2e; }
    .advisory-level-3 { background: #f97316; color: #fff; }
    .advisory-level-4 { background: #ef4444; color: #fff; }
    .advisory-unknown { background: #6b7280; color: #fff; }
    .advisory-text {
      flex: 1;
    }
    .advisory-title {
      font-size: 16px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 8px;
    }
    .advisory-description {
      font-size: 15px;
      color: #ddd;
      line-height: 1.5;
    }

    .info-section {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
      margin-bottom: 14px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .info-row {
      background: #122b4f;
      border: 1px solid #1a4a7a;
      border-radius: 12px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .info-label {
      color: #8fb4d9;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-value {
      color: #eef5ff;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 22px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 20px;
      text-align: center;
      padding: 30px;
    }
    
    .country-list::-webkit-scrollbar {
      width: 10px;
    }
    .country-list::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 5px;
    }
    .country-list::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 5px;
    }

    .top-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
      align-items: center;
    }
    .world-map-wrap {
      width: min(100%, 980px);
      background: #16213e;
      border-radius: 20px;
      padding: 12px;
    }
    .center-pane .world-map-wrap {
      width: 100%;
      margin-bottom: 12px;
    }
    .world-map {
      width: 100%;
      height: 320px;
      background: #06182a;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    .world-map-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #06182a;
      opacity: 0.92;
      z-index: 1;
    }
    .world-map-markers {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    .world-dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #fff;
    }
    .world-dot.visited {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.9);
    }
    .world-dot.selected {
      width: 12px;
      height: 12px;
      background: #a855f7;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.95);
      z-index: 3;
    }
    .stats-section {
      width: min(100%, 980px);
    }
    .center-pane .stats-section {
      width: 100%;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #16213e;
      border-radius: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      min-width: 100px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .continent-legend {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .continent-stat {
      background: #0f3460;
      padding: 10px 18px;
      border-radius: 12px;
      display: flex;
      align-items: center; gap: 10px;
    }
    .continent-stat .continent-name {
      font-size: 14px;
      color: #bbb;
      text-transform: capitalize;
    }
    .continent-stat .continent-count {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
    }
    .continent-stat .continent-total {
      font-size: 12px;
      color: #666;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #10b981;
      border-radius: 20px;
      padding: 24px 36px;
      max-width: 450px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #10b981;
      margin-bottom: 18px;
      font-size: 26px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: monospace;
      color: #10b981;
      font-size: 18px;
    }
    .shortcut-desc {
      color: #bbb;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      body {
        min-height: 100dvh;
      }
      .app-container {
        flex-direction: column;
        height: auto;
        min-height: 100dvh;
        padding: 10px;
        gap: 10px;
        overflow: visible;
      }
      .pane {
        width: 100% !important;
        min-width: 0 !important;
        max-height: none;
        padding: 14px;
        border-radius: 16px;
      }
      .left-pane { order: 1; }
      .center-pane { order: 2; }
      .right-pane { order: 3; }
      .pane-title {
        font-size: 20px;
        margin-bottom: 12px;
      }
      .search-box,
      .continent-select {
        font-size: 16px;
        padding: 12px 14px;
      }
      .filter-radios {
        gap: 6px;
      }
      .filter-radio {
        padding: 7px 10px;
        font-size: 12px;
      }
      .country-list {
        min-height: 220px;
        max-height: 42vh;
      }
      .center-content {
        max-height: none;
      }
      .stats-bar {
        gap: 8px;
        padding: 12px;
      }
      .stats-bar .stat-item {
        min-width: 88px;
        padding: 10px 12px;
      }
      .continent-legend {
        gap: 6px;
        padding: 10px;
      }
      .world-map {
        height: 260px;
      }
      .showcase {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        padding: 16px;
      }
      .showcase-top {
        grid-template-columns: 82px minmax(0, 1fr);
      }
      .showcase-flag {
        width: 82px;
        height: 82px;
        font-size: 56px;
      }
      .showcase-name {
        font-size: 28px;
      }
      .showcase-tags {
        justify-content: flex-start;
      }
      .showcase-meta,
      .info-grid {
        grid-template-columns: 1fr;
      }
      .select-btn {
        width: 100%;
        align-self: stretch;
        font-size: 16px;
        padding: 13px 14px;
        border-radius: 14px;
      }
      .travel-advisory,
      .info-section {
        padding: 14px;
      }
      .empty-state {
        min-height: 140px;
        height: auto;
        font-size: 18px;
        padding: 20px;
      }
    }

    @media (max-width: 600px) {
      html {
        font-size: 15px;
      }
      .app-container {
        padding: 8px;
        gap: 8px;
      }
      .pane {
        padding: 12px;
      }
      .country-item {
        padding: 11px;
        gap: 10px;
      }
      .country-item .flag {
        font-size: 24px;
      }
      .country-item .name {
        font-size: 14px;
      }
      .country-item .continent {
        font-size: 11px;
      }
      .showcase-name {
        font-size: 24px;
      }
      .showcase-native {
        font-size: 15px;
        width: 70px;
      }
      .showcase-top {
        grid-template-columns: 70px minmax(0, 1fr);
      }
      .showcase-flag {
        width: 70px;
        height: 70px;
        font-size: 48px;
      }
      .meta-item,
      .info-row {
        padding: 9px 10px;
      }
      .meta-value,
      .info-value {
        font-size: 13px;
      }
      .world-map {
        height: 220px;
      }
      .stats-bar .stat-item .stat-number {
        font-size: 20px;
      }
      .shortcuts-overlay {
        padding: 14px;
      }
      .shortcuts-panel {
        padding: 16px;
      }
      .shortcut-item {
        gap: 8px;
      }
      .shortcut-desc {
        font-size: 14px;
      }
      .shortcut-key {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Visit/Unvisit Country</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
    </div>
  </div>
  <div class="app-container">
    <div class="pane left-pane">
      <div class="pane-title">All Countries</div>
      <select class="continent-select" id="leftContinentFilter">
        <option value="all">All Continents</option>
        <option value="africa">Africa</option>
        <option value="asia">Asia</option>
        <option value="europe">Europe</option>
        <option value="north-america">North America</option>
        <option value="south-america">South America</option>
        <option value="oceania">Oceania</option>
      </select>
      <input type="text" class="search-box" id="leftSearch" placeholder="Search countries...">
      <div class="filter-radios" id="leftTravelFilter">
        <label class="filter-radio"><input type="radio" name="leftTravelRating" value="all" checked>All</label>
        <label class="filter-radio"><input type="radio" name="leftTravelRating" value="1">Rating 1</label>
        <label class="filter-radio"><input type="radio" name="leftTravelRating" value="2">Rating 2</label>
        <label class="filter-radio"><input type="radio" name="leftTravelRating" value="3">Rating 3</label>
        <label class="filter-radio"><input type="radio" name="leftTravelRating" value="4">Rating 4</label>
      </div>
      <div class="country-list" id="leftList"></div>
    </div>
    
    <div class="pane center-pane">
      <div class="stats-section">
        <div class="stats-bar" id="statsBar"></div>
        <div class="continent-legend" id="continentLegend"></div>
      </div>
      <div class="world-map-wrap">
        <div class="world-map" id="worldMap">
          <img class="world-map-image" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/2000px-World_map_-_low_resolution.svg.png" alt="World map">
          <div class="world-map-markers" id="worldMapMarkers"></div>
        </div>
      </div>
      <div class="center-content" id="centerContent">
        <div class="empty-state">Click a country to learn about it!</div>
      </div>
    </div>
    
    <div class="pane right-pane">
      <div class="pane-title">Visited Countries</div>
      <select class="continent-select" id="rightContinentFilter">
        <option value="all">All Continents</option>
        <option value="africa">Africa</option>
        <option value="asia">Asia</option>
        <option value="europe">Europe</option>
        <option value="north-america">North America</option>
        <option value="south-america">South America</option>
        <option value="oceania">Oceania</option>
      </select>
      <input type="text" class="search-box" id="rightSearch" placeholder="Search visited...">

    let visitedCountries = JSON.parse(localStorage.getItem('visitedCountries')) || {};
    let selectedCountryCode = null;
    let leftSearchTerm = "";
    let leftContinentFilterValue = "all";
    let leftTravelFilterValue = "all";
    let rightSearchTerm = "";
    let rightContinentFilterValue = "all";
    let rightTravelFilterValue = "all";
    let leftFocusedIndex = -1;
    let rightFocusedIndex = -1;

    const leftList = document.getElementById('leftList');
    const rightList = document.getElementById('rightList');
    const leftContinentFilter = document.getElementById('leftContinentFilter');
    const leftSearch = document.getElementById('leftSearch');
    const leftTravelFilterGroup = document.getElementById('leftTravelFilter');
    const leftTravelFilterRadios = document.querySelectorAll('input[name="leftTravelRating"]');
    const rightContinentFilter = document.getElementById('rightContinentFilter');
    const rightSearch = document.getElementById('rightSearch');
    const rightTravelFilterGroup = document.getElementById('rightTravelFilter');
    const rightTravelFilterRadios = document.querySelectorAll('input[name="rightTravelRating"]');
    const centerContent = document.getElementById('centerContent');
    const statsBar = document.getElementById('statsBar');
    const continentLegend = document.getElementById('continentLegend');
    const worldMap = document.getElementById('worldMap');
    const worldMapMarkers = document.getElementById('worldMapMarkers');
    const shortcutsOverlay = document.getElementById('shortcutsOverlay');

    function saveVisitedCountries() {
      localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
    }

    function calculateStats() {
      const total = COUNTRIES.length;
      const visitedCount = Object.keys(visitedCountries).length;
      const percent = total > 0 ? Math.round((visitedCount / total) * 100) : 0;
      
      statsBar.innerHTML = `
        <div class="stat-item">
          <div class="stat-label">Explored</div>
          <div class="stat-number">${visitedCount}</div>
        </div>
        <div class="stat-item highlight">
          <div class="stat-label">Progress</div>
          <div class="stat-number">${percent}%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Total</div>
          <div class="stat-number">${total}</div>
        </div>
      `;
    }

    function calculateContinentStats() {
      if (!continentLegend) return;

      const stats = {};
      COUNTRIES.forEach(c => {
        if (!stats[c.continent]) stats[c.continent] = { visited: 0, total: 0 };
        stats[c.continent].total++;
        if (visitedCountries[c.code]) stats[c.continent].visited++;
      });

      continentLegend.innerHTML = Object.entries(stats).map(([name, data]) => `
        <div class="continent-stat">
          <span class="continent-name">${name.replace('-', ' ')}</span>
          <span class="continent-count">${data.visited}</span>
          <span class="continent-total">/ ${data.total}</span>
        </div>
      `).join('');
    }

    function renderLeftList() {
      const filtered = COUNTRIES.filter(c => {
        const searchMatches = c.name.toLowerCase().includes(leftSearchTerm.toLowerCase()) ||
          c.code.toLowerCase().includes(leftSearchTerm.toLowerCase());
        const continentMatches = leftContinentFilterValue === 'all' || c.continent === leftContinentFilterValue;
        const ratingMatches = leftTravelFilterValue === 'all' || String(c.travelAdvisory) === leftTravelFilterValue;
        return searchMatches && continentMatches && ratingMatches;
      });

      leftList.innerHTML = filtered.map((c, index) => `
        <div class="country-item ${c.code === selectedCountryCode ? 'selected' : ''} ${index === leftFocusedIndex ? 'focused' : ''}" 
             onclick="selectCountry('${c.code}', false)" data-code="${c.code}">
          <span class="flag">${c.flag}</span>
          <div class="details">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent.replace('-', ' ')}</div>
          </div>
        </div>
      `).join('');
    }

    function renderRightList() {
      const visitedArray = COUNTRIES.filter(c => visitedCountries[c.code]);
      const filtered = visitedArray.filter(c => {
        const searchMatches = c.name.toLowerCase().includes(rightSearchTerm.toLowerCase());
        const continentMatches = rightContinentFilterValue === 'all' || c.continent === rightContinentFilterValue;
        const ratingMatches = rightTravelFilterValue === 'all' || String(c.travelAdvisory) === rightTravelFilterValue;
        return searchMatches && continentMatches && ratingMatches;
      });

      if (filtered.length === 0) {
        rightList.innerHTML = '<div class="empty-state">No visited countries found</div>';
        return;
      }

      rightList.innerHTML = filtered.map((c, index) => `
        <div class="country-item ${c.code === selectedCountryCode ? 'selected' : ''} ${index === rightFocusedIndex ? 'focused' : ''}" 
             onclick="selectCountry('${c.code}', true)" data-code="${c.code}">
          <span class="flag">${c.flag}</span>
          <div class="details">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent.replace('-', ' ')}</div>
          </div>
        </div>
      `).join('');
    }

    function selectCountry(code, fromRight = false) {
      selectedCountryCode = code;
      localStorage.setItem('lastSelectedCountry', code);
      const country = COUNTRIES.find(c => c.code === code);
      
      if (fromRight) {
        rightFocusedIndex = Array.from(rightList.querySelectorAll('.country-item')).findIndex(el => el.dataset.code === code);
        leftFocusedIndex = -1;
      } else {
        leftFocusedIndex = Array.from(leftList.querySelectorAll('.country-item')).findIndex(el => el.dataset.code === code);
        rightFocusedIndex = -1;
      }

      renderLeftList();
      renderRightList();
      renderCenter(country);
      renderWorldMapMarkers();
    }

    function toggleVisited(code) {
      if (visitedCountries[code]) {
        delete visitedCountries[code];
      } else {
        visitedCountries[code] = true;
      }
      saveVisitedCountries();
      calculateStats();
      calculateContinentStats();
      renderLeftList();
      renderRightList();
      renderWorldMapMarkers();

      const country = COUNTRIES.find(c => c.code === code);
      renderCenter(country);
    }

    function projectToWorldMap(lat, lng) {
      if (!worldMap) return null;

      const width = worldMap.clientWidth;
      const height = worldMap.clientHeight;
      const x = ((lng + 180) / 360) * width;
      const y = ((90 - lat) / 180) * height;
      return { x, y };
    }

    function renderWorldMapMarkers() {
      if (!worldMapMarkers || !worldMap) return;

      const markers = [];
      COUNTRIES.forEach(country => {
        if (!visitedCountries[country.code]) return;
        if (typeof country.lat !== 'number' || typeof country.lng !== 'number') return;

        const point = projectToWorldMap(country.lat, country.lng);
        if (!point) return;
        markers.push('<div class="world-dot visited" style="left:' + point.x + 'px; top:' + point.y + 'px;" title="' + country.name + '"></div>');
      });

      const selectedCountry = COUNTRIES.find(c => c.code === selectedCountryCode);
      if (selectedCountry && typeof selectedCountry.lat === 'number' && typeof selectedCountry.lng === 'number') {
        const selectedPoint = projectToWorldMap(selectedCountry.lat, selectedCountry.lng);
        if (selectedPoint) {
          markers.push('<div class="world-dot selected" style="left:' + selectedPoint.x + 'px; top:' + selectedPoint.y + 'px;" title="' + selectedCountry.name + '"></div>');
        }
      }

      worldMapMarkers.innerHTML = markers.join('');
    }

    function renderCenter(country) {
      if (!country) {
        centerContent.innerHTML = '<div class="empty-state">Country details will appear here</div>';
        return;
      }

      const isVisited = !!visitedCountries[country.code];
      
      centerContent.innerHTML = `
        <div class="showcase">
          <div class="showcase-top">
            <div class="showcase-flag-block">
              <div class="showcase-flag">${country.flag}</div>
              <div class="showcase-native">${country.nativeName}</div>
            </div>
            <div class="showcase-main">
              <div class="showcase-header">
                <div class="showcase-title-row">
                  <div class="showcase-name">${country.name}</div>
                  <div class="showcase-tags">
                    <div class="showcase-region region-${country.continent}">${country.continent.replace('-', ' ')}</div>
                    <div class="advisory-badge advisory-level-${country.travelAdvisory || 'unknown'}">TRAVEL LEVEL ${country.travelAdvisory || '?'}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="showcase-meta">
            <div class="meta-item"><span class="meta-label">Capital</span><span class="meta-value">${country.capital}</span></div>
            <div class="meta-item"><span class="meta-label">Population</span><span class="meta-value">${country.population?.toLocaleString() || 'Unknown'}</span></div>
            <div class="meta-item"><span class="meta-label">Currency</span><span class="meta-value">${country.currency}</span></div>
            <div class="meta-item"><span class="meta-label">Language</span><span class="meta-value">${country.language}</span></div>
            <div class="meta-item"><span class="meta-label">Country Code</span><span class="meta-value">${country.code}</span></div>
            <div class="meta-item"><span class="meta-label">Coordinates</span><span class="meta-value">${country.lat.toFixed(2)}, ${country.lng.toFixed(2)}</span></div>
          </div>
        </div>

        <button class="select-btn ${isVisited ? 'unselect' : ''}" onclick="toggleVisited('${country.code}')">
          ${isVisited ? 'REMOVE FROM VISITED LIST (CLICK)' : 'MOVE TO VISITED LIST (CLICK)'}
        </button>
      `;
    }

    leftContinentFilter.addEventListener('change', (e) => {
      leftContinentFilterValue = e.target.value;
      leftFocusedIndex = -1;
      renderLeftList();
    });

    leftSearch.addEventListener('input', (e) => {
      leftSearchTerm = e.target.value;
      leftFocusedIndex = -1;
      renderLeftList();
    });

    leftTravelFilterGroup.addEventListener('change', (e) => {
      if (e.target.name !== 'leftTravelRating') return;
      leftTravelFilterValue = e.target.value;
      leftFocusedIndex = -1;
      renderLeftList();
    });

    rightContinentFilter.addEventListener('change', (e) => {
      rightContinentFilterValue = e.target.value;
      rightFocusedIndex = -1;
      renderRightList();
    });

    rightSearch.addEventListener('input', (e) => {
      rightSearchTerm = e.target.value;
      rightFocusedIndex = -1;
      renderRightList();
    });

    rightTravelFilterGroup.addEventListener('change', (e) => {
      if (e.target.name !== 'rightTravelRating') return;
      rightTravelFilterValue = e.target.value;
      rightFocusedIndex = -1;
      renderRightList();
    });

    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        shortcutsOverlay.classList.toggle('visible');
        return;
      }

      if (e.key === 'Escape') {
        shortcutsOverlay.classList.remove('visible');
        leftSearch.value = "";
        rightSearch.value = "";
        leftContinentFilter.value = 'all';
        rightContinentFilter.value = 'all';
        leftTravelFilterRadios.forEach(radio => {
          radio.checked = radio.value === 'all';
        });
        rightTravelFilterRadios.forEach(radio => {
          radio.checked = radio.value === 'all';
        });
        leftSearchTerm = "";
        rightSearchTerm = "";
        leftContinentFilterValue = 'all';
        rightContinentFilterValue = 'all';
        leftTravelFilterValue = 'all';
        rightTravelFilterValue = 'all';
        renderLeftList();
        renderRightList();
        leftSearch.blur();
        rightSearch.blur();
        return;
      }

      if (['INPUT', 'SELECT'].includes(document.activeElement.tagName)) return;

      if (e.key === '/') {
        e.preventDefault();
        leftSearch.focus();
      }

      if (e.key === ' ' && selectedCountryCode) {
        e.preventDefault();
        toggleVisited(selectedCountryCode);
      }

      if (e.key.toLowerCase() === 'l' && selectedCountryCode) {
        toggleVisited(selectedCountryCode);
      }

      const isLeft = leftFocusedIndex !== -1 || (!rightSearch.matches(':focus') && rightFocusedIndex === -1);
      const list = isLeft ? leftList : rightList;
      const items = Array.from(list.querySelectorAll('.country-item'));
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      }
    });

    window.addEventListener('resize', () => {
      renderWorldMapMarkers();
    });

    // Fix: Wait for DOM before initializing
    document.addEventListener('DOMContentLoaded', () => {
      calculateStats();
      calculateContinentStats();
      renderLeftList();
      renderRightList();
      renderWorldMapMarkers();

      const lastSelected = localStorage.getItem('lastSelectedCountry');
      if (lastSelected) {
        const fromRight = !!visitedCountries[lastSelected];
        selectCountry(lastSelected, fromRight);
      }
    });
  </script>
</body>
</html>
