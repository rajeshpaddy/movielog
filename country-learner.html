<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Learner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #1a1a2e; 
      color: #eee; 
      min-height: 100vh; 
      overflow-x: hidden;
    }
    .app-container { 
      display: flex; 
      height: 100vh; 
      gap: 12px; 
      padding: 12px; 
    }
    .pane { 
      background: #16213e; 
      border-radius: 20px; 
      padding: 20px; 
      display: flex; 
      flex-direction: column;
    }
    .left-pane, .right-pane { 
      width: 320px; 
      flex-shrink: 0;
    }
    .center-pane { 
      flex: 1; 
      min-width: 350px;
    }
    .pane-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
      color: #10b981;
      text-align: center;
    }
    .search-box {
      width: 100%;
      background: #0f3460;
      border: 2px solid #10b981;
      color: #fff;
      padding: 14px 20px;
      border-radius: 30px;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .search-box::placeholder { color: #888; }
    .search-box:focus { outline: none; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 14px;
      color: #888;
    }
    .filter-buttons {
      display: flex;
      gap: 4px;
    }
    .filter-btn {
      background: #0f3460;
      border: 1px solid #10b981;
      color: #10b981;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover {
      background: #1a4a7a;
    }
    .filter-btn.active {
      background: #10b981;
      color: #1a1a2e;
    }
    .country-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .country-item {
      background: #0f3460;
      padding: 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .country-item:hover { 
      background: #1a4a7a; 
      transform: translateX(5px);
    }
    .country-item.selected {
      background: #10b981;
      color: #1a1a2e;
    }
    .country-item.focused {
      outline: 3px solid #10b981;
      outline-offset: -3px;
    }
    .country-item .flag {
      font-size: 28px;
    }
    .country-item .name {
      font-weight: 600;
      font-size: 16px;
      text-transform: capitalize;
    }
    .country-item .continent {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }
    .select-btn {
      background: #10b981;
      color: #1a1a2e;
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      align-self: center;
    }
    .select-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
    }
    .select-btn.unselect {
      background: #ef4444;
    }
    .showcase {
      background: #0f3460;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
    }
    .showcase-flag {
      font-size: 80px;
      margin-bottom: 10px;
    }
    .showcase-name {
      font-size: 36px;
      font-weight: bold;
      text-transform: capitalize;
      margin: 10px 0;
    }
    .showcase-native {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 10px;
    }
    .showcase-region {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 25px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    .region-asia { background: #ef4444; color: #fff; }
    .region-europe { background: #3b82f6; color: #fff; }
    .region-africa { background: #f59e0b; color: #fff; }
    .region-north-america { background: #10b981; color: #fff; }
    .region-south-america { background: #8b5cf6; color: #fff; }
    .region-oceania { background: #06b6d4; color: #fff; }
    
    .map-container {
      position: relative;
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
      min-height: 300px;
      display: flex;
      flex-direction: column;
    }
    .map-image {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 12px;
    }
    .travel-advisory {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .advisory-badge {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }
    .advisory-level-1 { background: #10b981; color: #fff; }
    .advisory-level-2 { background: #f59e0b; color: #1a1a2e; }
    .advisory-level-3 { background: #f97316; color: #fff; }
    .advisory-level-4 { background: #ef4444; color: #fff; }
    .advisory-unknown { background: #6b7280; color: #fff; }
    .advisory-text {
      flex: 1;
    }
    .advisory-title {
      font-size: 16px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 8px;
    }
    .advisory-description {
      font-size: 15px;
      color: #ddd;
      line-height: 1.5;
    }
    
    .info-section {
      background: #0f3460;
      border-radius: 20px;
      padding: 20px;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
      margin-bottom: 10px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #1a4a7a;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      color: #888;
      font-size: 15px;
    }
    .info-value {
      color: #eee;
      font-size: 15px;
      font-weight: 500;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 22px;
    }
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 20px;
      text-align: center;
      padding: 30px;
    }
    
    .country-list::-webkit-scrollbar {
      width: 10px;
    }
    .country-list::-webkit-scrollbar-track {
      background: #0f3460;
      border-radius: 5px;
    }
    .country-list::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 5px;
    }

    .top-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }
    .mini-map {
      width: 320px;
      height: 160px;
      background: #0f3460;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .mini-map-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.4;
    }
    .mini-dot {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #ef4444;
      border: 2px solid #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #ef4444;
      z-index: 10;
    }
    .stats-section {
      flex: 1;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      background: #16213e;
      border-radius: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stats-bar .stat-item {
      background: #0f3460;
      padding: 12px 20px;
      border-radius: 14px;
      text-align: center;
      min-width: 100px;
    }
    .stats-bar .stat-item .stat-label {
      font-size: 13px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stats-bar .stat-item .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #10b981;
    }
    .stats-bar .stat-item.highlight .stat-number {
      color: #fbbf24;
    }

    .continent-legend {
      display: flex;
      gap: 10px;
      padding: 14px 24px;
      background: #16213e;
      border-radius: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .continent-stat {
      background: #0f3460;
      padding: 10px 18px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .continent-stat .continent-name {
      font-size: 14px;
      color: #bbb;
      text-transform: capitalize;
    }
    .continent-stat .continent-count {
      font-size: 18px;
      font-weight: bold;
      color: #10b981;
    }
    .continent-stat .continent-total {
      font-size: 12px;
      color: #666;
    }

    .shortcuts-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: transparent;
      z-index: 1000;
      padding: 40px;
    }
    .shortcuts-overlay.visible {
      display: block;
    }
    .shortcuts-panel {
      background: rgba(22, 33, 62, 0.95);
      border: 2px solid #10b981;
      border-radius: 20px;
      padding: 24px 36px;
      max-width: 450px;
      margin: 0 auto;
    }
    .shortcuts-panel h2 {
      color: #10b981;
      margin-bottom: 18px;
      font-size: 26px;
    }
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2d2d3a;
    }
    .shortcut-item:last-child {
      border-bottom: none;
    }
    .shortcut-key {
      background: #0f3460;
      padding: 5px 14px;
      border-radius: 8px;
      font-family: monospace;
      color: #10b981;
      font-size: 18px;
    }
    .shortcut-desc {
      color: #bbb;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 10px;
      }
      .pane {
        width: 100% !important;
        min-width: unset !important;
        max-height: 45vh;
      }
      .left-pane { order: 1; }
      .center-pane { order: 2; }
      .right-pane { order: 3; }
      .stats-bar {
        gap: 8px;
        padding: 12px;
      }
      .continent-legend {
        gap: 6px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shortcuts-overlay" id="shortcutsOverlay">
    <div class="shortcuts-panel">
      <h2>Keyboard Shortcuts</h2>
      <div class="shortcut-item"><span class="shortcut-desc">Toggle shortcuts</span><span class="shortcut-key">Ctrl + /</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Focus search</span><span class="shortcut-key">/</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Visit/Unvisit Country</span><span class="shortcut-key">L</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Select/Unselect</span><span class="shortcut-key">Space</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Navigate up/down</span><span class="shortcut-key">↑ / ↓</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Next element</span><span class="shortcut-key">Tab</span></div>
      <div class="shortcut-item"><span class="shortcut-desc">Close/Clear</span><span class="shortcut-key">Escape</span></div>
    </div>
  </div>

    function loadVisitedCountries() {
      const saved = localStorage.getItem('visitedCountries');
      if (saved) {

      }
    }
    
    function saveVisitedCountries() {
      localStorage.setItem('visitedCountries', JSON.stringify(visitedCountries));
    }
    
    function calculateStats() {
      const now = Date.now();
      const day = 24 * 60 * 60 * 1000;
      
      const visited = Object.keys(visitedCountries).map(code => COUNTRIES.find(c => c.code === code)).filter(Boolean);
      
      const last24h = visited.filter(c => now - visitedCountries[c.code] < day).length;
      const last7d = visited.filter(c => now - visitedCountries[c.code] < 7 * day).length;
      const last30d = visited.filter(c => now - visitedCountries[c.code] < 30 * day).length;
      
      statsBar.innerHTML = `
        <div class="stat-item highlight">
          <div class="stat-label">Total Countries</div>
          <div class="stat-number">${COUNTRIES.length}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Visited</div>
          <div class="stat-number">${visited.length}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 24h</div>
          <div class="stat-number">${last24h}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 7d</div>
          <div class="stat-number">${last7d}</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Last 30d</div>
          <div class="stat-number">${last30d}</div>
        </div>
      `;
    }
    
    function calculateContinentStats() {
      const continents = {};
      const visited = Object.keys(visitedCountries).map(code => COUNTRIES.find(c => c.code === code)).filter(Boolean);
      
      COUNTRIES.forEach(c => {
        if (!continents[c.continent]) {
          continents[c.continent] = { total: 0, visited: 0 };
        }
        continents[c.continent].total++;
        if (visitedCountries[c.code]) {
          continents[c.continent].visited++;
        }
      });
      
      const continentNames = {
        'asia': 'Asia',
        'europe': 'Europe',
        'africa': 'Africa',
        'north-america': 'N. America',
        'south-america': 'S. America',
        'oceania': 'Oceania'
      };
      
      continentLegend.innerHTML = Object.entries(continents).map(([continent, stats]) => `
        <div class="continent-stat">
          <span class="continent-name">${continentNames[continent]}</span>
          <span class="continent-count">${stats.visited}</span>
          <span class="continent-total">/ ${stats.total}</span>
        </div>
      `).join('');
    }
    
    function getRegionClass(continent) {
      return 'region-' + continent;
    }
    
    function formatContinent(continent) {
      return continent.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }
    
    function getTravelAdvisoryClass(level) {
      return 'advisory-level-' + level;
    }
    
    function getTravelAdvisoryText(level) {
      const texts = {
        1: 'Exercise Normal Precautions',
        2: 'Exercise Increased Caution',
        3: 'Reconsider Travel',
        4: 'Do Not Travel'
      };
      return texts[level] || 'Unknown';
    }
    
    function formatPopulation(num) {
      return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    
    function renderLeftList() {
      const query = leftSearch.value.toLowerCase();
      let unvisited = allCountries.filter(c => !visitedCountries[c.code] && !failedCountries.has(c.code) && (c.name.toLowerCase().includes(query) || c.flag.includes(query)));
      
      if (travelRatingFilter !== 'all') {
        unvisited = unvisited.filter(c => c.travelAdvisory === parseInt(travelRatingFilter));
      }
      
      leftList.innerHTML = unvisited.map((c, i) => `
        <div class="country-item ${selectedCountry?.code === c.code && !selectedFromRight ? 'selected' : ''} ${i === leftFocusedIndex ? 'focused' : ''}" data-code="${c.code}" data-index="${i}" tabindex="0">
          <div class="flag">${c.flag}</div>
          <div class="info">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent}</div>
          </div>
        </div>
      `).join('');
      
      leftList.querySelectorAll('.country-item').forEach(item => {
        item.addEventListener('click', () => selectCountry(item.dataset.code, false));
      });
    }
    
    function renderRightList() {
      const query = rightSearch.value.toLowerCase();
      const visited = allCountries.filter(c => visitedCountries[c.code] && (c.name.toLowerCase().includes(query) || c.flag.includes(query)));
      
      rightList.innerHTML = visited.map((c, i) => `
        <div class="country-item ${selectedCountry?.code === c.code && selectedFromRight ? 'selected' : ''} ${i === rightFocusedIndex ? 'focused' : ''}" data-code="${c.code}" data-index="${i}" tabindex="0">

          <div class="info">
            <div class="name">${c.name}</div>
            <div class="continent">${c.continent}</div>
          </div>
        </div>
      `).join('');
      
      rightList.querySelectorAll('.country-item').forEach(item => {
        item.addEventListener('click', () => selectCountry(item.dataset.code, true));
      });
    }
    
    function selectCountry(code, fromRight) {
      selectedCountry = allCountries.find(c => c.code === code);
      selectedFromRight = fromRight;
      localStorage.setItem('lastSelectedCountry', code);
      renderLeftList();
      renderRightList();
      showCountryDetails(selectedCountry);
    }

            <span class="showcase-region ${getRegionClass(country.continent)}">${formatContinent(country.continent)}</span>
          </div>
          
          <div class="travel-advisory">
            <div class="advisory-badge ${getTravelAdvisoryClass(country.travelAdvisory)}">${country.travelAdvisory}</div>
            <div class="advisory-text">
              <div class="advisory-title">${getTravelAdvisoryText(country.travelAdvisory)}</div>
              <div class="advisory-description">${country.travelNote}</div>
            </div>
          </div>
          
          <div class="info-section">
            <div class="section-title">Country Details</div>
            <div class="info-row">
              <span class="info-label">Capital</span>
              <span class="info-value">${country.capital}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Population</span>
              <span class="info-value">${formatPopulation(country.population)}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Currency</span>
              <span class="info-value">${country.currency}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Language</span>
              <span class="info-value">${country.language}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Country Code</span>
              <span class="info-value">${country.code}</span>
            </div>
          </div>
          
          <div class="map-container">
            <img class="map-image" src="https://raw.githubusercontent.com/djaiss/mapsicon/master/all/${country.code.toLowerCase()}/vector.svg" alt="${country.name} map" onerror="this.onerror=null; this.style.display='none'">
          </div>
        `;
        
        document.getElementById('selectBtn').addEventListener('click', toggleCountry);
        
        const dot = document.getElementById('countryDot');
        if (dot && country.lat && country.lng) {
          const mapWidth = 1000;
          const mapHeight = 500;
          const left = ((country.lng + 180) / 360) * mapWidth;
          const top = ((90 - country.lat) / 180) * mapHeight;
          dot.style.left = (left / mapWidth * 100) + '%';
          dot.style.top = (top / mapHeight * 100) + '%';
          dot.style.display = 'block';
        }
        
        const miniDot = document.getElementById('miniDot');
        if (miniDot && country.lat && country.lng) {
          const miniLeft = ((country.lng + 180) / 360) * 100;
          const miniTop = ((90 - country.lat) / 180) * 100;
          miniDot.style.left = miniLeft + '%';
          miniDot.style.top = miniTop + '%';
          miniDot.style.display = 'block';
        }
        
      } catch (error) {
        failedCountries.add(country.code);
        renderLeftList();
        centerContent.innerHTML = '<div class="empty-state">Error loading country details</div>';
        console.error(error);
      }
    }
    
    function toggleCountry() {
      if (!selectedCountry) return;
      
      if (selectedFromRight) {
        delete visitedCountries[selectedCountry.code];
      } else {
        visitedCountries[selectedCountry.code] = Date.now();
      }
      
      saveVisitedCountries();
      selectedFromRight = !selectedFromRight;
      calculateStats();
      calculateContinentStats();
      renderLeftList();
      renderRightList();
      showCountryDetails(selectedCountry);
    }
    
    let tabFocus = 'leftSearch';
    
    leftSearch.addEventListener('input', renderLeftList);
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        travelRatingFilter = btn.dataset.rating;
        renderLeftList();
      });
    });
    rightSearch.addEventListener('input', renderRightList);
    
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        shortcutsOverlay.classList.toggle('visible');
        return;
      }
      
      if (shortcutsOverlay.classList.contains('visible')) {
        if (e.key === 'Escape') {
          shortcutsOverlay.classList.remove('visible');
        }
        return;
      }
      
      if (e.target === document.body || e.target === document.documentElement) {
        if (e.key === 'l' || e.key === 'L') {
          if (selectedCountry) {
            toggleCountry();
          }
        } else if (e.key === '/') {
          e.preventDefault();
          leftSearch.focus();
        } else if (e.key === 'Escape') {
          leftSearch.value = '';
          rightSearch.value = '';
          renderLeftList();
          renderRightList();
          leftSearch.focus();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          leftSearch.value = '';
          leftSearch.blur();
          renderLeftList();
        }
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        e.preventDefault();
        if (shortcutsOverlay.classList.contains('visible')) {
          shortcutsOverlay.classList.remove('visible');
        } else {
          rightSearch.value = '';
          rightSearch.blur();
          renderRightList();
        }
      }
    });
    
    leftSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftSearch') {
          tabFocus = 'leftList';
          leftFocusedIndex = 0;
          renderLeftList();
          const firstItem = leftList.querySelector('.country-item');
          if (firstItem) {
            const code = firstItem.dataset.code;
            selectCountry(code, false);
          }
        } else if (tabFocus === 'rightList') {
          tabFocus = 'leftSearch';
          leftSearch.focus();
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    rightSearch.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        if (tabFocus === 'leftList') {
          tabFocus = 'rightSearch';
          rightSearch.focus();
        } else if (tabFocus === 'rightSearch') {
          tabFocus = 'rightList';
          rightFocusedIndex = 0;
          renderRightList();
          const firstItem = rightList.querySelector('.country-item');
          if (firstItem) {
            const code = firstItem.dataset.code;
            selectCountry(code, true);
          }
        }
      } else if (e.key === ' ') {
        e.preventDefault();
        const btn = document.getElementById('selectBtn');
        if (btn) btn.click();
      }
    });
    
    function handleListKeydown(isLeft) {
      return (e) => {
        const list = isLeft ? leftList : rightList;
        
        if (e.key === 'Tab') {
          e.preventDefault();
          if (isLeft && tabFocus === 'leftList') {
            tabFocus = 'rightSearch';
            rightSearch.focus();
          } else if (!isLeft && tabFocus === 'rightList') {
            tabFocus = 'leftSearch';
            leftSearch.focus();
          }
        } else if (e.key === ' ') {
          e.preventDefault();
          const btn = document.getElementById('selectBtn');
          if (btn) btn.click();
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          const items = list.querySelectorAll('.country-item');
          if (isLeft) {
            leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
          } else {
            rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.country-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const code = focused.dataset.code;
            selectCountry(code, !isLeft);
          }
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          const items = list.querySelectorAll('.country-item');
          if (isLeft) {
            leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
          } else {
            rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
          }
          renderLeftList();
          renderRightList();
          const focused = list.querySelector('.country-item.focused');
          if (focused) {
            focused.scrollIntoView({ block: 'nearest' });
            const code = focused.dataset.code;
            selectCountry(code, !isLeft);
          }
        }
      };
    }
    
    leftList.addEventListener('keydown', handleListKeydown(true));
    rightList.addEventListener('keydown', handleListKeydown(false));
    
    document.addEventListener('keydown', (e) => {
      if (shortcutsOverlay.classList.contains('visible')) return;
      
      if (e.target.tagName === 'INPUT') return;
      
      const isLeft = tabFocus === 'leftList';
      const list = isLeft ? leftList : rightList;
      const items = list.querySelectorAll('.country-item');
      if (items.length === 0) return;
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.min(leftFocusedIndex + 1, items.length - 1);
        } else {
          rightFocusedIndex = Math.min(rightFocusedIndex + 1, items.length - 1);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (isLeft) {
          leftFocusedIndex = Math.max(leftFocusedIndex - 1, 0);
        } else {
          rightFocusedIndex = Math.max(rightFocusedIndex - 1, 0);
        }
        renderLeftList();
        renderRightList();
        const focused = list.querySelector('.country-item.focused');
        if (focused) {
          focused.scrollIntoView({ block: 'nearest' });
          const code = focused.dataset.code;
          selectCountry(code, !isLeft);
        }
      }
    });
    
    loadVisitedCountries();
    calculateStats();
    calculateContinentStats();
    renderLeftList();
    renderRightList();
    
    const lastSelected = localStorage.getItem('lastSelectedCountry');
    if (lastSelected) {
      const fromRight = !!visitedCountries[lastSelected];
      selectCountry(lastSelected, fromRight);
    }
  </script>
</body>
</html>
